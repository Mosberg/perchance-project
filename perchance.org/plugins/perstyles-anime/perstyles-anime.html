<style>
  body {
    background-color: black;
    height: 100vh;
  }
  .button {
    padding: 5px 10px;
    font-size: 18px;
    margin: 0 5px;
    border-radius: 20%;
    text-decoration: none;
    color: white;
    border: none;
    cursor: pointer;
    transition: background-color 0.5s;
  }
</style>
<br /><br />
<a href="https://perchance.org/t2i-styles" class="button">T2I Styles</a>
<br /><br />
<a href="https://perchance.org/ai-art-generator-advanced" class="button"
  >AI Art A. Gen</a
>

<script>
  const colors = ["blue", "purple", "red"];
  let colorIndex = 0;

  function changeColor() {
    colorIndex = (colorIndex + 1) % colors.length;
    document.querySelectorAll(".button").forEach((button) => {
      button.style.backgroundColor = colors[colorIndex];
    });
  }

  setInterval(changeColor, 500); // Change color every 500ms
</script>
