<div id="starfield"></div>
<div
  style="position:relative; margin-top: 10vh; display:[window.generatorName === 'ai-art-generator-advanced' ? 'none' : 'inline-block']"
>
  <a href="https://perchance.org/ai-art-generator-advanced"
    ><img
      src="https://files.catbox.moe/c80l39.webp"
      style="border-radius: 15px; max-width: 100%; height: auto" />
    <div
      id="changingTextCtn"
      style="
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px;
        border-radius: 0 0 15px 15px;
        font-size: small;
        text-align: center;
      "
    >
      <span id="changingTextEl" class="blue-neon"
        >This is Kuronyx, she is doing some hack things.</span
      >
      <div>
        Visit the Ai Art Generator Advanced by clicking the img<br />
      </div></div
  ></a>
</div>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: black;
  }
  #starfield {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background-color: white;
    border-radius: 50%;
    box-shadow: 0 0 10px 2px cyan;
  }
</style>
<script>
  function createStar(x, y, size) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = x + "px";
    star.style.top = y + "px";
    star.style.width = star.style.height = size + "px";
    starfield.appendChild(star);
  }

  function populateStars() {
    let w = window.innerWidth,
      h = window.innerHeight;
    let borderWidth = Math.min(w, h) * 0.1; // 10% of smaller dimension
    for (let i = 0; i < 200; i++) {
      let x,
        y,
        size = Math.random() * 3 + 1;
      if (Math.random() < 0.5) {
        x =
          Math.random() < 0.5
            ? Math.random() * borderWidth
            : w - Math.random() * borderWidth;
        y = Math.random() * h;
      } else {
        x = Math.random() * w;
        y =
          Math.random() < 0.5
            ? Math.random() * borderWidth
            : h - Math.random() * borderWidth;
      }
      createStar(x, y, size);
    }
  }

  populateStars();
  window.addEventListener("resize", () => {
    starfield.innerHTML = "";
    populateStars();
  });
</script>
