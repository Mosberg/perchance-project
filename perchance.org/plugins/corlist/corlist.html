<script>
  TheCurrentColor = "There is not a color currently..."; //Keeps the color name
  TheCurrentColorBelow = "There is not a color currently...";
  Color = "";

  function GetSelectedColor(itemToPaint) {
    let CurrentColor = "";
    CurrentColor = itemToPaint.value;
    Color = CurrentColor;
    let selectedColor = itemToPaint.options[itemToPaint.selectedIndex];
    let ColorClass = selectedColor.className;
    document.getElementById("paintedColor").className = ColorClass;
    TheCurrentColor = "The current color is " + String(Color);
    update(CC);
  }

  function GetSelectedColorTwo(itemToPaint) {
    let CurrentColor = "";
    CurrentColor = itemToPaint.value;

    TheCurrentColorBelow = "The current color is " + String(Color);
