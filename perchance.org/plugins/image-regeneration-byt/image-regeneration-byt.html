  function rng() {
    const number = Math.floor(Math.random() * 10);
    return number;
  }
  function rngSeed() {
    const digits = rng();
    const numberArray = [];
    for (let n = 0; n < digits + 1; n++) {
      numberArray.push(rng());
    }
    let stringNumber = String(numberArray.join(""));
    if (stringNumber.startsWith("0"))
      stringNumber = stringNumber.replace("0", "9");
    return stringNumber;
  }
  function rngColor() {
    const number = rng();
    let specialColors = [
      "grey",
      "pink",
      "aquamarine",
      "silver",
      "golden",
      "rainbow",
      "dark blue",
      "dark green",
      "magenta",

      0: "red",
      1: "orange",
      2: "yellow",
      3: "blue",
      4: "green",
      5: "purple",
      6: "black",
      7: "white",
      8: "brown",
      9: specialColors[rng()],
    };
    return Colors[number];
  }
