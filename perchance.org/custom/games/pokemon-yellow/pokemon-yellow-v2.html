<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pokémon Yellow v2 - Phaser 4 Adventure Edition</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        background: linear-gradient(180deg, #0f0f23 0%, #000 100%);
        color: #e0f8e0;
        font-family: "Press Start 2P", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      h1 {
        font-size: 17px;
        color: #f8d030;
        text-shadow:
          2px 2px 0 #000,
          0 0 10px #f8d030;
        margin-bottom: 10px;
        letter-spacing: 1.5px;
        text-align: center;
      }

      #game-wrapper {
        border: 8px solid #c8c8c8;
        border-radius: 0 0 60px 0;
        box-shadow:
          inset 0 0 20px rgba(0, 0, 0, 0.8),
          0 0 40px rgba(248, 208, 48, 0.55);
        background: #081820;
        position: relative;
        overflow: hidden;
      }

      #game-container {
        width: 360px;
        height: 320px;
        background: #0f0f1f;
      }

      #loadingEl {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        color: #f8d030;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }

      #controls {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1fr 200px;
        gap: 20px;
        width: 360px;
        max-width: 92vw;
      }

      .dpad-container {
        display: grid;
        grid-template-areas:
          ". up ."
          "left center right"
          ". down .";
        grid-template-columns: 60px 60px 60px;
        grid-template-rows: 60px 60px 60px;
        gap: 5px;
        place-items: center;
      }

      .dpad-btn {
        width: 60px;
        height: 60px;
        border: 4px solid #606060;
        border-radius: 8px;
        background: linear-gradient(145deg, #404040, #303030);
        color: #e0e0e0;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 0 #202020;
        transition: all 0.1s;
      }

      .dpad-btn:active {
        background: linear-gradient(145deg, #303030, #202020);
        box-shadow: 0 1px 0 #202020;
        transform: translateY(3px);
      }

      .dpad-up {
        grid-area: up;
      }

      .dpad-left {
        grid-area: left;
      }

      .dpad-down {
        grid-area: down;
      }

      .dpad-right {
        grid-area: right;
      }

      .action-container {
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
      }

      .ab-btn {
        width: 70px;
        height: 70px;
        border: 4px solid #c04050;
        border-radius: 50%;
        background: linear-gradient(145deg, #d06070, #a03040);
        color: #ffffff;
        font-size: 28px;
        font-weight: bold;
        box-shadow: 0 6px 0 #802030;
        transition: all 0.1s;
      }

      .ab-btn:active {
        background: linear-gradient(145deg, #a03040, #802030);
        box-shadow: 0 2px 0 #802030;
        transform: translateY(4px);
      }

      .start-btn {
        width: 125px;
        height: 40px;
        border: 3px solid #60a0c0;
        border-radius: 20px;
        background: linear-gradient(145deg, #70b0d0, #5090b0);
        color: #ffffff;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 0 #407090;
      }

      .start-btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #407090;
      }

      .info {
        margin-top: 13px;
        font-size: 10px;
        color: #a0c0a0;
        text-align: center;
        max-width: 360px;
        line-height: 1.4;
      }

      #save-status {
        position: absolute;
        top: 9px;
        right: 9px;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px 8px;
        border-radius: 5px;
        font-size: 9px;
        color: #f8d030;
        z-index: 1200;
      }

      function displayPokemonName(pokemon) {
        if (!pokemon) return "";
        return pokemon.nickname || pokemon.species;
      }

      function markPressed(key, fromRepeat = false) {
        if (!(key in inputState)) return;
        inputState[key] = true;
        if (!fromRepeat) {
          const tapKey = `${key}Tap`;
          if (tapKey in inputState) {
            inputState[tapKey] = true;
          }
        }
      }

      function markReleased(key) {
        if (key in inputState) {
          inputState[key] = false;
        }
      }

      function consumeTap(key) {
        const tapKey = `${key}Tap`;
        if (!(tapKey in inputState)) return false;
        const tapped = inputState[tapKey];
        inputState[tapKey] = false;
        return tapped;
      }

      function bindHoldButton(button, key) {
        const onDown = (event) => {
          if (event.cancelable) event.preventDefault();
          markPressed(key);
        };

        const onUp = (event) => {
          if (event && event.cancelable) event.preventDefault();
          markReleased(key);
        };

        button.addEventListener("mousedown", onDown);
        button.addEventListener("mouseup", onUp);
        button.addEventListener("mouseleave", onUp);
        button.addEventListener("touchstart", onDown, { passive: false });
        button.addEventListener("touchend", onUp, { passive: false });
        button.addEventListener("touchcancel", onUp, { passive: false });
      }

      document.querySelectorAll("[data-dir]").forEach((button) => {
        bindHoldButton(button, button.dataset.dir);
      });

      document.querySelectorAll("[data-action]").forEach((button) => {
        bindHoldButton(button, button.dataset.action.toLowerCase());
      });

      function makeTextureDataUrl(size, drawFn) {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        if (!ctx) return "";
        drawFn(ctx, size);
        return canvas.toDataURL();
      }

      function makeTileTexture(kind) {
        return makeTextureDataUrl(32, (ctx) => {
          if (kind === "grass") {
            ctx.fillStyle = "#74c241";
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillStyle = "#5ba832";
            for (let y = 0; y < 32; y += 5) {
              ctx.fillRect(0, y, 32, 1);
            }
            ctx.fillStyle = "#9be464";
            for (let x = 2; x < 32; x += 6) {
              ctx.fillRect(x, (x * 3) % 28, 2, 2);
            }
            return;
          }

          if (kind === "path") {
            ctx.fillStyle = "#d4ce9b";
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillStyle = "#c0b081";
            for (let x = 0; x < 32; x += 4) {
              ctx.fillRect(x, 0, 1, 32);
            }
            return;
          }

          if (kind === "wall") {
            ctx.fillStyle = "#3d5f29";
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillStyle = "#4f7a34";
            ctx.fillRect(2, 2, 28, 28);
            ctx.fillStyle = "#315123";
            for (let y = 0; y < 32; y += 6) {
              ctx.fillRect(0, y, 32, 2);
            }
            return;
          }

          if (kind === "water") {
            ctx.fillStyle = "#56a0d8";
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillStyle = "#2d84c0";
            for (let y = 0; y < 32; y += 6) {
              ctx.fillRect(0, y, 32, 2);
            }
            return;
          }

          ctx.fillStyle = "#888";
          ctx.fillRect(0, 0, 32, 32);
        });
      }

        return makeTextureDataUrl(32, (ctx) => {

          ctx.fillStyle = secondary;
          ctx.fillRect(10, 2, 12, 7);
          ctx.fillStyle = "#f6d4b8";
          ctx.fillRect(10, 10, 12, 7);
          ctx.fillStyle = primary;
          ctx.fillRect(7, 17, 18, 10);
          ctx.fillStyle = "#273748";
          ctx.fillRect(9, 27, 6, 4);
          ctx.fillRect(17, 27, 6, 4);
          ctx.fillStyle = accent;
          ctx.fillRect(10, 2, 12, 2);
          ctx.fillRect(12, 12, 2, 2);
          ctx.fillRect(18, 12, 2, 2);
        });
      }

          geodude: ["#b0bec5", "#607d8b"],
          onix: ["#90a4ae", "#546e7a"],
          staryu: ["#ffd180", "#ffab40"],
          starmie: ["#ce93d8", "#ab47bc"],
          magnemite: ["#b0bec5", "#78909c"],
          voltorb: ["#ef9a9a", "#e53935"],
          machop: ["#90caf9", "#1e88e5"],
          oddish: ["#a5d6a7", "#43a047"],
          psyduck: ["#fff59d", "#fdd835"],
        };

        const [primary, secondary] = palettes[slug(species)] || ["#bdbdbd", "#757575"];
        return makeTextureDataUrl(32, (ctx) => {
          ctx.fillStyle = primary;
          ctx.fillRect(5, 8, 22, 16);
          ctx.fillStyle = secondary;
          ctx.fillRect(8, 4, 16, 6);
          ctx.fillRect(3, 11, 4, 9);
          ctx.fillRect(25, 11, 4, 9);
          ctx.fillStyle = "#000000";
          ctx.fillRect(11, 14, 2, 2);
          ctx.fillRect(19, 14, 2, 2);
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 7px monospace";
          ctx.fillText(species[0].toUpperCase(), 13, 23);
        });
      }

      function fillRect(map, x, y, width, height, tile) {
        for (let row = y; row < y + height; row += 1) {
          for (let col = x; col < x + width; col += 1) {
            if (!map[row] || map[row][col] === undefined) continue;
            map[row][col] = tile;
          }
        }
      }

      function createWorldMap() {
        const width = 32;
        const height = 20;
        const map = Array.from({ length: height }, (_, y) =>
          Array.from({ length: width }, (_, x) => {
            if (x === 0 || y === 0 || x === width - 1 || y === height - 1) {
              return TILE.WALL;
            }
            return TILE.GRASS;
          }),
        );

        for (let x = 1; x < width - 1; x += 1) {
          map[10][x] = TILE.PATH;
        }

        for (let y = 1; y < height - 1; y += 1) {
          map[y][5] = TILE.PATH;
          map[y][15] = TILE.PATH;
          map[y][25] = TILE.PATH;
        }

        for (let x = 5; x <= 15; x += 1) {
          map[15][x] = TILE.PATH;
        }

        for (let x = 15; x <= 25; x += 1) {
          map[4][x] = TILE.PATH;
          map[15][x] = TILE.PATH;
        }

        fillRect(map, 2, 13, 7, 5, TILE.PATH);
        fillRect(map, 12, 7, 7, 5, TILE.PATH);
        fillRect(map, 22, 2, 7, 5, TILE.PATH);
        fillRect(map, 22, 13, 7, 5, TILE.PATH);

        fillRect(map, 26, 7, 3, 3, TILE.WATER);
        fillRect(map, 8, 3, 2, 5, TILE.WALL);
        fillRect(map, 17, 13, 2, 4, TILE.WALL);

        return map;
      }

      function calcStat(base, level, isHp = false) {
        if (isHp) return Math.floor((2 * base * level) / 100 + level + 10);
        return Math.floor((2 * base * level) / 100 + 5);
      }

      function expForNext(level) {
        return Math.max(18, Math.floor(level * level * 1.8 + level * 10 + 24));
      }

      function buildMove(moveName) {
        const moveData = MOVE_DATA[moveName] || MOVE_DATA.Tackle;
        return {
          name: moveName,
          pp: moveData.pp,
          maxPp: moveData.pp,
        };
      }

      function buildPokemon(species, level = 5) {
        const meta = SPECIES_DATA[species] || SPECIES_DATA.Pidgey;
        const safeLevel = clamp(Math.floor(level) || 5, 2, 100);
        const maxHp = calcStat(meta.base.hp, safeLevel, true);
        return {
          species,
          nickname: "",
          level: safeLevel,
          exp: 0,
          types: meta.types.slice(0, 2),
          maxHp,
          hp: maxHp,
          attack: calcStat(meta.base.atk, safeLevel),
          defense: calcStat(meta.base.def, safeLevel),
          speed: calcStat(meta.base.spd, safeLevel),
          status: "none",
          statusTurns: 0,
          moves: meta.moves.slice(0, 4).map(buildMove),
        };
      }

      function normalizeMove(rawMove) {
        if (!rawMove || !MOVE_DATA[rawMove.name]) return null;
        const moveData = MOVE_DATA[rawMove.name];
        return {
          name: rawMove.name,
          pp: clamp(Math.floor(rawMove.pp) || moveData.pp, 0, moveData.pp),
          maxPp: moveData.pp,
        };
      }

      function normalizePokemon(rawPokemon) {
        if (!rawPokemon || typeof rawPokemon !== "object") return null;
        const species = SPECIES_DATA[rawPokemon.species]
          ? rawPokemon.species
          : "Pidgey";
        const meta = SPECIES_DATA[species];
        const level = clamp(Math.floor(rawPokemon.level) || 3, 2, 100);
        const maxHp = calcStat(meta.base.hp, level, true);

        const normalized = {
          species,
          nickname:
            typeof rawPokemon.nickname === "string"
              ? rawPokemon.nickname.slice(0, 12)
              : "",
          level,
          exp: Math.max(0, Math.floor(rawPokemon.exp) || 0),
          types: meta.types.slice(0, 2),
          maxHp,
          hp: clamp(Math.floor(rawPokemon.hp) || maxHp, 0, maxHp),
          attack: calcStat(meta.base.atk, level),
          defense: calcStat(meta.base.def, level),
          speed: calcStat(meta.base.spd, level),
          status: ["none", "poison", "burn", "paralysis", "sleep"].includes(
            rawPokemon.status,
          )
            ? rawPokemon.status
            : "none",
          statusTurns: clamp(Math.floor(rawPokemon.statusTurns) || 0, 0, 5),
          moves: [],
        };

        normalized.moves = (Array.isArray(rawPokemon.moves)
          ? rawPokemon.moves
          : [])
          .map(normalizeMove)
          .filter(Boolean)
          .slice(0, 4);

        if (normalized.moves.length === 0) {
          normalized.moves = meta.moves.slice(0, 4).map(buildMove);
        }

        return normalized;
      }

      function clearStatus(pokemon) {
        pokemon.status = "none";
        pokemon.statusTurns = 0;
      }

      function healPokemon(pokemon) {
        pokemon.hp = pokemon.maxHp;
        clearStatus(pokemon);
        pokemon.moves = pokemon.moves.map((move) => ({
          ...move,
          pp: move.maxPp,
        }));
      }

      function gainExperience(pokemon, amount) {
        const meta = SPECIES_DATA[pokemon.species] || SPECIES_DATA.Pidgey;
        pokemon.exp += Math.max(0, Math.floor(amount) || 0);
        let gainedLevels = 0;
        const learnedMoves = [];

        while (pokemon.level < 100 && pokemon.exp >= expForNext(pokemon.level)) {
          pokemon.exp -= expForNext(pokemon.level);
          pokemon.level += 1;
          gainedLevels += 1;

          const previousMax = pokemon.maxHp;
          pokemon.maxHp = calcStat(meta.base.hp, pokemon.level, true);
          pokemon.attack = calcStat(meta.base.atk, pokemon.level);
          pokemon.defense = calcStat(meta.base.def, pokemon.level);
          pokemon.speed = calcStat(meta.base.spd, pokemon.level);
          pokemon.hp = clamp(
            pokemon.hp + (pokemon.maxHp - previousMax) + 4,
            1,
            pokemon.maxHp,
          );

          for (const moveName of meta.moves) {
            const hasMove = pokemon.moves.some((move) => move.name === moveName);
            if (!hasMove && pokemon.moves.length < 4) {
              pokemon.moves.push(buildMove(moveName));
              learnedMoves.push(moveName);
              break;
            }
          }
        }

        pokemon.hp = clamp(pokemon.hp, 0, pokemon.maxHp);
        return { gainedLevels, learnedMoves };
      }

      function createDefaultSave() {
        return {
          version: 4,
          playerName: "Ash",
          position: { x: 4, y: 16 },
          lastHeal: { x: 7, y: 14 },
          party: [],
          boxed: [],
          pokedex: { seen: {}, caught: {} },
          inventory: {
            pokeball: 10,
            potion: 4,
            superPotion: 2,
            antidote: 2,
            paralyzeHeal: 2,
          },
          badges: [],
          money: 3200,
          activeIndex: 0,
          flags: {
            oakIntro: false,
            starterPicked: false,
            rivalRouteDefeated: false,
            brockDefeated: false,
            mistyDefeated: false,
            surgeDefeated: false,
            rivalBridgeDefeated: false,
          },
        };
      }

      function normalizeSave(raw) {
        const base = createDefaultSave();
        const source = raw && typeof raw === "object" ? raw : {};

        const save = {
          ...base,
          ...source,
          position: { ...base.position, ...(source.position || {}) },
          lastHeal: { ...base.lastHeal, ...(source.lastHeal || {}) },
          inventory: { ...base.inventory, ...(source.inventory || {}) },
          flags: { ...base.flags, ...(source.flags || {}) },
          pokedex: {
            seen: {
              ...base.pokedex.seen,
              ...((source.pokedex && source.pokedex.seen) || {}),
            },
            caught: {
              ...base.pokedex.caught,
              ...((source.pokedex && source.pokedex.caught) || {}),
            },
          },
        };

        save.party = (Array.isArray(source.party) ? source.party : [])
          .map(normalizePokemon)
          .filter(Boolean);

        save.boxed = (Array.isArray(source.boxed) ? source.boxed : [])
          .map(normalizePokemon)
          .filter(Boolean);

        save.activeIndex = clamp(
          Math.floor(source.activeIndex) || 0,
          0,
          Math.max(0, save.party.length - 1),
        );

        Object.keys(save.inventory).forEach((item) => {
          save.inventory[item] = Math.max(0, Math.floor(save.inventory[item]) || 0);
        });

        save.badges = Array.isArray(source.badges)
          ? source.badges.filter((badge) => BADGE_ORDER.includes(badge))
          : [];

        if (save.party.length === 0 && save.flags.starterPicked) {
          save.party.push(buildPokemon("Pikachu", 6));
          save.activeIndex = 0;
        }

        save.money = Math.max(0, Math.floor(save.money) || 0);
        return save;
      }

      function registerDex(saveData, species, caught = false) {
        saveData.pokedex.seen[species] = true;
        if (caught) saveData.pokedex.caught[species] = true;
      }

      function addPokemonToCollection(saveData, pokemon) {
        const normalized = normalizePokemon(pokemon);
        if (!normalized) return "none";
        if (saveData.party.length < 6) {
          saveData.party.push(normalized);
          return "party";
        }
        saveData.boxed.push(normalized);
        return "box";
      }

      async function loadGame() {
        try {
          let raw = null;
          if (ROOT?.kv?.pokemonSave?.get) {
            raw = await ROOT.kv.pokemonSave.get(SAVE_KEY);
          } else {
            raw = localStorage.getItem(SAVE_KEY);
          }
          if (!raw) return createDefaultSave();
          return normalizeSave(JSON.parse(raw));
        } catch (error) {
          console.warn("Load failed; using default", error);
          return createDefaultSave();
        }
      }

      async function saveGame(state) {
        try {
          const payload = JSON.stringify(normalizeSave(state));
          if (ROOT?.kv?.pokemonSave?.set) {
            await ROOT.kv.pokemonSave.set(SAVE_KEY, payload);
          } else {
            localStorage.setItem(SAVE_KEY, payload);
          }
          return true;
        } catch (error) {
          console.warn("Save failed", error);
          return false;
        }
      }

      function findEncounterZone(tileX, tileY) {
        return ENCOUNTER_ZONES.find((zone) => {
          return (
            tileX >= zone.bounds.x1 &&
            tileX <= zone.bounds.x2 &&
            tileY >= zone.bounds.y1 &&
            tileY <= zone.bounds.y2
          );
        });
      }

      function chooseWildPokemon(zoneName) {
        const zone = ENCOUNTER_ZONES.find((entry) => entry.name === zoneName);
        if (!zone) return buildPokemon("Pidgey", 4);

        const totalWeight = zone.table.reduce((sum, entry) => sum + entry.weight, 0);
        let roll = Math.random() * totalWeight;
        for (const entry of zone.table) {
          roll -= entry.weight;
          if (roll <= 0) {
            const level = Phaser.Math.Between(entry.min, entry.max);
            return buildPokemon(entry.species, level);
          }
        }

        return buildPokemon(zone.table[0].species, zone.table[0].min);
      }

      async function generateAssets() {
        const assets = {};
        const progressEl = document.getElementById("progress");
        const trainerRequests = [
          {
            key: "player",
            prompt: "Pokemon Yellow style Ash trainer sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#1e88e5", "#f44336", "#ffe082"),
          },
          {
            key: "oak",
            prompt: "Pokemon Yellow style Professor Oak sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#ef6c00", "#fafafa", "#90caf9"),
          },
          {
            key: "rival",
            prompt: "Pokemon Yellow style Blue rival sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#6d4c41", "#5c6bc0", "#c5e1a5"),
          },
          {
            key: "brock",
            prompt: "Pokemon gym leader Brock sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#8d6e63", "#3e2723", "#ffe0b2"),
          },
          {
            key: "misty",
            prompt: "Pokemon gym leader Misty sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#ef6c00", "#ffccbc", "#80deea"),
          },
          {
            key: "surge",
            prompt: "Pokemon gym leader Lt Surge sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#f9a825", "#fdd835", "#fff59d"),
          },
          {
            key: "nurse",
            prompt: "Pokemon Center nurse sprite 32x32 pixel art",
            fallback: makeCharacterTexture("#ec407a", "#ffe0f0", "#ffffff"),
          },
        ];

        const totalTasks = trainerRequests.length + Object.keys(SPECIES_DATA).length + 4;
        let completed = 0;

        const updateProgress = () => {
          const percent = Math.round((completed / totalTasks) * 100);
          progressEl.textContent = `${percent}%`;
        };

        for (const request of trainerRequests) {
          let generated = null;
          if (typeof ROOT.generateImage === "function") {
            try {
              generated = await ROOT.generateImage(request.prompt, {
                resolution: "64x64",
                style: "pixel art",
              });
            } catch (error) {
              console.warn(`Generator failed for ${request.key}`, error);
            }
          }

          assets[request.key] = generated || request.fallback;
          completed += 1;
          updateProgress();
        }

        assets["tile-grass"] = makeTileTexture("grass");
        completed += 1;
        updateProgress();
        assets["tile-path"] = makeTileTexture("path");
        completed += 1;
        updateProgress();
        assets["tile-wall"] = makeTileTexture("wall");
        completed += 1;
        updateProgress();
        assets["tile-water"] = makeTileTexture("water");
        completed += 1;
        updateProgress();

        Object.keys(SPECIES_DATA).forEach((species) => {
          assets[speciesTextureKey(species)] = makeMonsterTexture(species);
          completed += 1;
          updateProgress();
        });

        progressEl.textContent = "100%";
        return assets;
      }

      class YellowV2Game {
        constructor() {
          this.game = null;
          this.assets = null;
          this.saveData = null;
          this.autoSaveInterval = null;
          this.init();
        }

        async init() {
          const loadingEl = document.getElementById("loadingEl");
          this.saveData = await loadGame();
          this.assets = await generateAssets();

          loadingEl.style.display = "none";
          document.getElementById("save-status").style.display = "block";
          this.startGame();

          this.autoSaveInterval = setInterval(() => this.autoSave(), 12000);
          window.addEventListener("beforeunload", () => {
            if (this.autoSaveInterval) clearInterval(this.autoSaveInterval);
          });
        }

        startGame() {
          const config = {
            type: Phaser.AUTO,
            width: 360,
            height: 320,
            parent: "game-container",
            backgroundColor: "#0f1f3f",
            scale: {
              mode: Phaser.Scale.FIT,
              autoCenter: Phaser.Scale.CENTER_BOTH,
              pixelArt: true,
            },
            physics: {
              default: "arcade",
              arcade: {
                gravity: { x: 0, y: 0 },
                debug: false,
              },
            },
            scene: [BootScene, WorldScene, BattleScene, MenuScene],
          };

          this.game = new Phaser.Game(config);
          this.game.registry.set("assets", this.assets || {});
          this.game.registry.set("saveData", normalizeSave(this.saveData));
          this.game.registry.set("pendingBattleResult", null);
        }

        async autoSave() {
          if (!this.game) return;
          const statusEl = document.getElementById("save-status");
          const success = await saveGame(this.game.registry.get("saveData"));
          statusEl.textContent = success ? "Saved" : "Save failed";
          setTimeout(() => {
            statusEl.textContent = "";
          }, 1700);
        }
      }

      class BootScene extends Phaser.Scene {
        constructor() {
          super({ key: "BootScene" });
        }

        preload() {
          const assets = this.registry.get("assets") || {};
          Object.entries(assets).forEach(([key, value]) => {
            if (typeof value === "string" && value.startsWith("data:image")) {
              this.load.image(key, value);
            }
          });
        }

        createFallbackTexture(key, color) {
          if (this.textures.exists(key)) return;
          const graphics = this.add.graphics();
          graphics.fillStyle(color, 1);
          graphics.fillRect(0, 0, 32, 32);
          graphics.generateTexture(key, 32, 32);
          graphics.destroy();
        }

        create() {
          this.createFallbackTexture("player", 0x4488cc);
          this.createFallbackTexture("oak", 0xffaa00);
          this.createFallbackTexture("rival", 0x7788ff);
          this.createFallbackTexture("brock", 0x996633);
          this.createFallbackTexture("misty", 0xff8a65);
          this.createFallbackTexture("surge", 0xffb300);
          this.createFallbackTexture("nurse", 0xff66aa);

          this.createFallbackTexture("tile-grass", 0x66aa33);
          this.createFallbackTexture("tile-path", 0xd4ce9b);
          this.createFallbackTexture("tile-wall", 0x4c8038);
          this.createFallbackTexture("tile-water", 0x5599dd);

          Object.keys(SPECIES_DATA).forEach((species) => {
            this.createFallbackTexture(speciesTextureKey(species), 0xb0bec5);
          });

          this.scene.start("WorldScene");
        }
      }

      class WorldScene extends Phaser.Scene {
        constructor() {
          super({ key: "WorldScene" });
          this.worldMap = createWorldMap();
          this.encounterMeter = 0;
          this.encounterCooldown = 1200;
          this.lastDirection = "down";
          this.dialogueActive = false;
          this.dialogueQueue = [];
          this.dialogueOnComplete = null;
          this.lastPositionSync = 0;
          this.battleInProgress = false;
        }

        create() {
          this.saveData = normalizeSave(this.registry.get("saveData"));
          this.registry.set("saveData", this.saveData);

          this.createMapVisuals();
          this.createNpcSprites();
          this.createPlayer();
          this.setupInput();
          this.createHud();
          this.createDialogueBox();

          this.physics.add.collider(this.player, this.wallGroup);
          this.physics.add.collider(this.player, this.waterGroup);
          this.physics.add.collider(this.player, this.npcGroup);

          this.events.on("resume", this.onResumeFromScene, this);
          this.updateHud();

          if (!this.saveData.flags.oakIntro) {
            this.saveData.flags.oakIntro = true;
            this.showDialogue([
              "Ash! Kanto is bigger than ever.",
              "Meet Professor Oak for your partner Pokemon.",
            ]);
          }
        }

        createMapVisuals() {
          const width = this.worldMap[0].length * TILE_SIZE;
          const height = this.worldMap.length * TILE_SIZE;

          this.physics.world.setBounds(0, 0, width, height);
          this.cameras.main.setBounds(0, 0, width, height);

          this.wallGroup = this.physics.add.staticGroup();
          this.waterGroup = this.physics.add.staticGroup();
          this.interactions = new Map();

          this.worldMap.forEach((row, y) => {
            row.forEach((tile, x) => {
              const worldX = x * TILE_SIZE;
              const worldY = y * TILE_SIZE;

              if (tile === TILE.WALL) {
                this.add.image(worldX, worldY, "tile-wall").setOrigin(0);
                this.wallGroup.create(worldX + 16, worldY + 16, "tile-wall");
                return;
              }

              if (tile === TILE.WATER) {
                this.add.image(worldX, worldY, "tile-water").setOrigin(0);
                this.waterGroup.create(worldX + 16, worldY + 16, "tile-water");
                return;
              }

              if (tile === TILE.PATH) {
                this.add.image(worldX, worldY, "tile-path").setOrigin(0);
              } else {
                this.add.image(worldX, worldY, "tile-grass").setOrigin(0);
              }
            });
          });

          WORLD_INTERACTIONS.forEach((entry) => {
            this.interactions.set(`${entry.x},${entry.y}`, entry);
            const markerColor =
              entry.type === "center"
                ? 0x90caf9
                : entry.type === "gymSign"
                  ? 0xffcc80
                  : entry.type === "routeSign"
                    ? 0xa5d6a7
                    : 0xfff59d;

            this.add
              .rectangle(
                entry.x * TILE_SIZE + TILE_SIZE / 2,
                entry.y * TILE_SIZE + TILE_SIZE / 2,
                18,
                8,
                markerColor,
              )
              .setAlpha(0.85);
          });
        }

        createNpcSprites() {
          this.npcGroup = this.physics.add.staticGroup();
          this.npcSprites = [];

          const npcData = [
            { id: "oak", x: 3, y: 15, texture: "oak" },
            { id: "rival-route", x: 11, y: 10, texture: "rival" },
            { id: "brock", x: 14, y: 8, texture: "brock" },
            { id: "misty", x: 24, y: 3, texture: "misty" },
            { id: "surge", x: 24, y: 14, texture: "surge" },
            { id: "rival-bridge", x: 19, y: 4, texture: "rival" },
            { id: "nurse-pallet", x: 7, y: 15, texture: "nurse" },
            { id: "nurse-cerulean", x: 25, y: 3, texture: "nurse" },
            { id: "nurse-vermilion", x: 25, y: 14, texture: "nurse" },
          ];

          npcData.forEach((npc) => {
            const sprite = this.physics.add
              .staticSprite(
                npc.x * TILE_SIZE + TILE_SIZE / 2,
                npc.y * TILE_SIZE + TILE_SIZE / 2,
                npc.texture,
              )
              .setDepth(15);
            sprite.setData("id", npc.id);
            sprite.refreshBody();
            this.npcGroup.add(sprite);
            this.npcSprites.push(sprite);
          });
        }

        createPlayer() {
          const x = clamp(this.saveData.position.x || 4, 1, this.worldMap[0].length - 2);
          const y = clamp(this.saveData.position.y || 16, 1, this.worldMap.length - 2);

          this.player = this.physics.add
            .sprite(x * TILE_SIZE + 16, y * TILE_SIZE + 16, "player")
            .setDepth(20);
          this.player.setCollideWorldBounds(true);
          this.player.body.setSize(20, 24);
          this.player.body.setOffset(6, 8);

          this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
        }

        setupInput() {
          this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            left: Phaser.Input.Keyboard.KeyCodes.LEFT,
            right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
            a: Phaser.Input.Keyboard.KeyCodes.Z,
            b: Phaser.Input.Keyboard.KeyCodes.X,
            start: Phaser.Input.Keyboard.KeyCodes.ENTER,
          });

        updateHud() {
          const activePokemon =
            this.saveData.party[this.saveData.activeIndex] || this.saveData.party[0] || null;

          const activeLine = activePokemon
            ? `${displayPokemonName(activePokemon)} Lv${activePokemon.level} HP ${activePokemon.hp}/${activePokemon.maxHp}`
            : "No Pokemon";

          this.hudText.setText(
            `ASH  ${activeLine}  BALL ${this.saveData.inventory.pokeball}  $${this.saveData.money}`,
          );

          let objective = "Objective: Talk to Professor Oak";
          if (this.saveData.flags.starterPicked && !this.saveData.flags.rivalRouteDefeated) {
            objective = "Objective: Defeat Rival Blue on Route 1";
          } else if (
            this.saveData.flags.rivalRouteDefeated &&
            !this.saveData.flags.brockDefeated
          ) {
            objective = "Objective: Earn the Boulder Badge from Brock";
          } else if (
            this.saveData.flags.brockDefeated &&
            !this.saveData.flags.mistyDefeated
          ) {
            objective = "Objective: Challenge Misty in Cerulean City";
          } else if (
            this.saveData.flags.mistyDefeated &&
            !this.saveData.flags.surgeDefeated
          ) {
            objective = "Objective: Challenge Lt. Surge in Vermilion";
          } else if (
            this.saveData.flags.surgeDefeated &&
            !this.saveData.flags.rivalBridgeDefeated
          ) {
            objective = "Objective: Defeat Rival Blue again on the northern bridge";
          } else if (this.saveData.flags.rivalBridgeDefeated) {
            objective = `Objective: Build your elite team (${Object.keys(this.saveData.pokedex.caught).length} caught)`;
          }

          this.objectiveText.setText(objective);
        }

        showDialogue(lines, onComplete = null) {
          this.dialogueQueue = Array.isArray(lines) ? lines.slice() : [String(lines)];
          this.dialogueOnComplete = onComplete;
          this.dialogueActive = true;
          this.dialoguePanel.setVisible(true);
          this.dialogueText.setVisible(true);
          this.dialogueHint.setVisible(true);
          this.advanceDialogue();
        }

        advanceDialogue() {
          if (!this.dialogueActive) return;
          if (this.dialogueQueue.length === 0) {
            this.closeDialogue();
            return;
          }
          this.dialogueText.setText(this.dialogueQueue.shift());
        }

        closeDialogue() {
          this.dialogueActive = false;
          this.dialoguePanel.setVisible(false);
          this.dialogueText.setVisible(false);
          this.dialogueHint.setVisible(false);

          const callback = this.dialogueOnComplete;
          this.dialogueOnComplete = null;
          if (typeof callback === "function") callback();
        }

        onResumeFromScene() {
          this.battleInProgress = false;
          this.updateHud();
        }

        getFirstAliveIndex() {
          for (let i = 0; i < this.saveData.party.length; i += 1) {
            if (this.saveData.party[i].hp > 0) return i;
          }
          return -1;
        }

        healParty(showMessage = true) {
          this.saveData.party.forEach((pokemon) => healPokemon(pokemon));
          this.registry.set("saveData", this.saveData);
          this.updateHud();

          if (showMessage) {
            this.showDialogue([
              "Your team is fully healed!",
              "Status conditions and PP were restored.",
            ]);
          }
        }

        giveStarter() {
          const pikachu = buildPokemon("Pikachu", 6);
          this.saveData.party = [pikachu];
          this.saveData.activeIndex = 0;
          this.saveData.flags.starterPicked = true;
          this.saveData.inventory.pokeball += 5;
          this.saveData.inventory.potion += 2;
          registerDex(this.saveData, "Pikachu", true);
          this.registry.set("saveData", this.saveData);
          this.updateHud();

          this.showDialogue([
            "Professor Oak: Ash, Pikachu trusts your spirit.",
            "You got Pikachu, 5 Poke Balls, and 2 Potions!",
            "Head out and prove yourself against Rival Blue.",
          ]);
        }

        startBattle(config) {
          if (this.battleInProgress) return;
          const alive = this.getFirstAliveIndex();
          if (alive === -1) {
            this.healParty(false);
            this.showDialogue([
              "Your entire team is down.",
              "You rushed to the nearest Pokemon Center.",
            ]);
            return;
          }

          this.saveData.activeIndex = alive;
          this.registry.set("saveData", this.saveData);
          this.registry.set("pendingBattleResult", null);

          this.battleInProgress = true;
          this.scene.launch("BattleScene", config);
          this.scene.pause();
        }

        handleNpcInteraction(npcId) {
          if (npcId === "oak") {
            if (!this.saveData.flags.starterPicked) {
              this.showDialogue(
                [
                  "Professor Oak: Welcome, Ash.",
                  "A real trainer needs a partner before adventure begins.",
                ],
                () => this.giveStarter(),
              );
              return;
            }

            this.showDialogue([
              "Professor Oak: You are growing stronger.",
              "Study your type matchups and manage your party wisely.",
            ]);
            return;
          }

          if (
            npcId === "nurse-pallet" ||
            npcId === "nurse-cerulean" ||
            npcId === "nurse-vermilion"
          ) {
            this.saveData.lastHeal = {
              x: Math.floor(this.player.x / TILE_SIZE),
              y: Math.floor(this.player.y / TILE_SIZE),
            };
            this.healParty(true);
            return;
          }

          if (npcId === "rival-route") {
            if (!this.saveData.flags.starterPicked) {
              this.showDialogue(["Blue: Get your first Pokemon before talking big."]);
              return;
            }

            if (!this.saveData.flags.rivalRouteDefeated) {
              this.showDialogue(["Blue: Ash! Show me what your Pikachu can do!"], () => {
                this.startBattle({
                  battleType: "trainer",
                  trainerName: "Rival Blue",
                  canRun: false,
                  allowCapture: false,
                  moneyReward: 600,
                  flagOnWin: "rivalRouteDefeated",
                  enemyTeam: [buildPokemon("Eevee", 8), buildPokemon("Pidgey", 7)],
                });
              });
              return;
            }

            this.showDialogue([
              "Blue: Keep moving, Ash.",
              "Gyms get harder from here.",
            ]);
            return;
          }

          if (npcId === "brock") {
            if (!this.saveData.flags.rivalRouteDefeated) {
              this.showDialogue([
                "Brock: Defeat your rival first. Confidence matters.",
              ]);
              return;
            }

            if (!this.saveData.flags.brockDefeated) {
              this.showDialogue(["Brock: Rock-hard defense, rock-solid will!"], () => {
                this.startBattle({
                  battleType: "gym",
                  trainerName: "Leader Brock",
                  canRun: false,
                  allowCapture: false,
                  moneyReward: 1400,
                  flagOnWin: "brockDefeated",
                  badgeOnWin: "Boulder Badge",
                  enemyTeam: [buildPokemon("Geodude", 10), buildPokemon("Onix", 12)],
                });
              });
              return;
            }

            this.showDialogue([
              "Brock: Good timing and party composition win tough fights.",
            ]);
            return;
          }

          if (npcId === "misty") {
            if (!this.saveData.flags.brockDefeated) {
              this.showDialogue([
                "Misty: Bring me proof with Brock's badge first.",
              ]);
              return;
            }

            if (!this.saveData.flags.mistyDefeated) {
              this.showDialogue(["Misty: Water-type grace can still hit hard!"], () => {
                this.startBattle({
                  battleType: "gym",
                  trainerName: "Leader Misty",
                  canRun: false,
                  allowCapture: false,
                  moneyReward: 1900,
                  flagOnWin: "mistyDefeated",
                  badgeOnWin: "Cascade Badge",
                  enemyTeam: [buildPokemon("Staryu", 14), buildPokemon("Starmie", 16)],
                });
              });
              return;
            }

            this.showDialogue([
              "Misty: Predicting your opponent's next move is the key.",
            ]);
            return;
          }

          if (npcId === "surge") {
            if (!this.saveData.flags.mistyDefeated) {
              this.showDialogue([
                "Lt. Surge: Earn the Cascade Badge before you challenge me!",
              ]);
              return;
            }

            if (!this.saveData.flags.surgeDefeated) {
              this.showDialogue(["Lt. Surge: Lightning battle, no holding back!"], () => {
                this.startBattle({
                  battleType: "gym",
                  trainerName: "Lt. Surge",
                  canRun: false,
                  allowCapture: false,
                  moneyReward: 2400,
                  flagOnWin: "surgeDefeated",
                  badgeOnWin: "Thunder Badge",
                  enemyTeam: [
                    buildPokemon("Magnemite", 18),
                    buildPokemon("Voltorb", 18),
                    buildPokemon("Pikachu", 20),
                  ],
                });
              });
              return;
            }

            this.showDialogue([
              "Lt. Surge: Keep your team healed and your strategy sharp.",
            ]);
            return;
          }

          if (npcId === "rival-bridge") {
            if (!this.saveData.flags.surgeDefeated) {
              this.showDialogue([
                "Blue: Meet me here after your third badge, Ash.",
              ]);
              return;
            }

            if (!this.saveData.flags.rivalBridgeDefeated) {
              this.showDialogue(["Blue: Last round before the League trail!"], () => {
                this.startBattle({
                  battleType: "trainer",
                  trainerName: "Champion Hopeful Blue",

        getFacingTile() {
          const currentX = Math.floor(this.player.x / TILE_SIZE);
          const currentY = Math.floor(this.player.y / TILE_SIZE);
          const offsets = {
            up: { x: 0, y: -1 },
            down: { x: 0, y: 1 },
            left: { x: -1, y: 0 },
            right: { x: 1, y: 0 },
          };
          const offset = offsets[this.lastDirection] || offsets.down;
          return { x: currentX + offset.x, y: currentY + offset.y };
        }

        interactWithTile(tile) {
          if (tile.type === "center") {
            this.saveData.lastHeal = { x: tile.x, y: tile.y };
            this.healParty(true);
            return;
          }

          this.showDialogue(tile.text || ["There is nothing unusual here."]);
        }

        interact() {
          const nearestNpc = this.npcSprites.find((npc) => {
            return (
              Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                npc.x,
                npc.y,
              ) < 36
            );
          });

          if (nearestNpc) {
            this.handleNpcInteraction(nearestNpc.getData("id"));
            return;
          }

          const facing = this.getFacingTile();
          const tile = this.interactions.get(`${facing.x},${facing.y}`);
          if (tile) {
            this.interactWithTile(tile);
          }
        }

        consumeBattleResult() {
          const result = this.registry.get("pendingBattleResult");
          if (!result) return;
          this.registry.set("pendingBattleResult", null);

          const messages = [];
          if (Array.isArray(result.seenSpecies)) {
            result.seenSpecies.forEach((species) => registerDex(this.saveData, species, false));
          }

          if (result.result === "win") {
            if (result.flagOnWin) {
              this.saveData.flags[result.flagOnWin] = true;
            }

            if (result.badgeOnWin && !this.saveData.badges.includes(result.badgeOnWin)) {
              this.saveData.badges.push(result.badgeOnWin);
              messages.push(`Earned ${result.badgeOnWin}!`);
            }

            if (result.moneyReward) {
              this.saveData.money += result.moneyReward;
              messages.push(`Received $${result.moneyReward}!`);
            }
          }

          if (result.capturedPokemon) {
            registerDex(this.saveData, result.capturedPokemon.species, true);
            const location = addPokemonToCollection(this.saveData, result.capturedPokemon);
            if (location === "party") {
              messages.push(`${result.capturedPokemon.species} joined your party!`);
            } else if (location === "box") {
              messages.push(`${result.capturedPokemon.species} was sent to your PC box.`);
            }
          }

          if (result.playerFainted) {
            this.healParty(false);
            const healX = this.saveData.lastHeal.x * TILE_SIZE + TILE_SIZE / 2;
            const healY = this.saveData.lastHeal.y * TILE_SIZE + TILE_SIZE / 2;
            this.player.setPosition(healX, healY);
            messages.push("Your team was restored at the nearest Pokemon Center.");
          }

          if (Array.isArray(result.levelUpMessages)) {
            messages.push(...result.levelUpMessages);
          }

          this.registry.set("saveData", this.saveData);
          this.updateHud();
          if (messages.length > 0) {
            this.showDialogue(messages);
          }
        }

        checkWildEncounter(delta, isMoving) {
          if (!isMoving || this.battleInProgress || !this.saveData.flags.starterPicked) {
            this.encounterMeter = Math.max(0, this.encounterMeter - delta * 0.0008);
            return;
          }

          if (this.encounterCooldown > 0) return;

          const tileX = Math.floor(this.player.x / TILE_SIZE);
          const tileY = Math.floor(this.player.y / TILE_SIZE);
          const zone = findEncounterZone(tileX, tileY);

          if (!zone) {
            this.encounterMeter = Math.max(0, this.encounterMeter - delta * 0.0012);
            return;
          }

          const tile = this.worldMap[tileY] && this.worldMap[tileY][tileX];
          if (tile !== TILE.GRASS) {
            this.encounterMeter = Math.max(0, this.encounterMeter - delta * 0.0014);
            return;
          }

          this.encounterMeter += delta * 0.0016;
          const chance = Math.min(0.23, this.encounterMeter * 0.02);

          if (Math.random() < chance) {
            this.encounterMeter = 0;
            this.encounterCooldown = 2500;
            const wildPokemon = chooseWildPokemon(zone.name);
            this.showDialogue([`A wild ${wildPokemon.species} appeared in ${zone.name}!`], () => {
              this.startBattle({
                battleType: "wild",
                trainerName: "Wild",
                canRun: true,
                allowCapture: true,
                enemyTeam: [wildPokemon],
              });
            });
          }
        }

        update(time, delta) {
          this.consumeBattleResult();
          this.encounterCooldown = Math.max(0, this.encounterCooldown - delta);

          const aTap =
            Phaser.Input.Keyboard.JustDown(this.keys.a) || consumeTap("a");
          const bTap =
            Phaser.Input.Keyboard.JustDown(this.keys.b) || consumeTap("b");
          const startTap =
            Phaser.Input.Keyboard.JustDown(this.keys.start) || consumeTap("start");

          if (this.dialogueActive) {
            if (aTap || bTap) this.advanceDialogue();
            this.player.body.setVelocity(0);
            return;
          }

          if (!this.battleInProgress && startTap) {
            this.scene.launch("MenuScene");
            this.scene.pause();
            return;
          }

          if (!this.battleInProgress && aTap) {
            this.interact();
            return;
          }

          const up = this.keys.up.isDown || inputState.up;
          const down = this.keys.down.isDown || inputState.down;
          const left = this.keys.left.isDown || inputState.left;
          const right = this.keys.right.isDown || inputState.right;

          const moveX = (right ? 1 : 0) - (left ? 1 : 0);
          const moveY = (down ? 1 : 0) - (up ? 1 : 0);
          const direction = new Phaser.Math.Vector2(moveX, moveY);
          this.player.body.setVelocity(0);

          let isMoving = false;
          if (direction.lengthSq() > 0) {
            isMoving = true;
            direction.normalize().scale(124);
            this.player.body.setVelocity(direction.x, direction.y);

            if (Math.abs(direction.x) > Math.abs(direction.y)) {
              this.lastDirection = direction.x < 0 ? "left" : "right";
              this.player.setFlipX(direction.x < 0);
            } else {
              this.lastDirection = direction.y < 0 ? "up" : "down";
            }
          }

          if (time - this.lastPositionSync > 180) {
            this.lastPositionSync = time;
            this.saveData.position = {
              x: clamp(Math.floor(this.player.x / TILE_SIZE), 1, this.worldMap[0].length - 2),
              y: clamp(Math.floor(this.player.y / TILE_SIZE), 1, this.worldMap.length - 2),
            };
            this.registry.set("saveData", this.saveData);
          }

          this.checkWildEncounter(delta, isMoving);
        }
      }

      class BattleScene extends Phaser.Scene {
        constructor() {
          super({ key: "BattleScene" });
          this.battleConfig = {};
          this.menuState = "command";
          this.menuItems = [];
          this.menuCursor = 0;
          this.menuOffset = 0;
          this.inputEnabled = false;
          this.battleEnded = false;
          this.levelUpMessages = [];
        }

        init(data) {
          this.battleConfig = data || {};
        }

        create() {
          this.saveData = normalizeSave(this.registry.get("saveData"));
          this.playerTeam = this.saveData.party;

          this.playerIndex = this.findNextAlivePartyIndex(this.saveData.activeIndex || 0);
          if (this.playerIndex === -1) {
            this.finishBattle("lose", { playerFainted: true });
            return;
          }

          this.battleConfig = {
            battleType: "wild",
            trainerName: "Wild",
            canRun: true,
            allowCapture: true,
            moneyReward: 0,
            flagOnWin: null,
            badgeOnWin: null,
            enemyTeam: [buildPokemon("Pidgey", 4)],
            ...this.battleConfig,
          };

          this.enemyTeam = (
            Array.isArray(this.battleConfig.enemyTeam)
              ? this.battleConfig.enemyTeam
              : [buildPokemon("Pidgey", 4)]
          )
            .map(normalizePokemon)
            .filter(Boolean);

          if (this.enemyTeam.length === 0) {
            this.enemyTeam = [buildPokemon("Pidgey", 4)];
          }

          this.enemyIndex = 0;
          this.playerStages = { attack: 0, defense: 0, speed: 0 };
          this.enemyStages = { attack: 0, defense: 0, speed: 0 };

          this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            left: Phaser.Input.Keyboard.KeyCodes.LEFT,
            right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
            a: Phaser.Input.Keyboard.KeyCodes.Z,
            b: Phaser.Input.Keyboard.KeyCodes.X,
          });

          this.createBattleBackground();
          this.createSprites();
          this.createUi();
          this.refreshBattleUi();

          this.showMessage(
            `${this.battleConfig.trainerName} sent out ${displayPokemonName(this.currentEnemyPokemon())}!`,
            1100,
          ).then(() => {
            this.setMenuState("command");
            this.inputEnabled = true;
            this.messageText.setText("Choose an action.");
          });
        }

        currentPlayerPokemon() {
          return this.playerTeam[this.playerIndex];
        }

        currentEnemyPokemon() {
          return this.enemyTeam[this.enemyIndex];
        }

        findNextAlivePartyIndex(start) {
          if (!this.playerTeam || this.playerTeam.length === 0) return -1;
          const total = this.playerTeam.length;
          for (let i = 0; i < total; i += 1) {
            const index = (start + i) % total;
            if (this.playerTeam[index].hp > 0) return index;
          }
          return -1;
        }

        findNextAliveEnemyIndex(start) {
          for (let i = start; i < this.enemyTeam.length; i += 1) {
            if (this.enemyTeam[i].hp > 0) return i;
          }
          return -1;
        }
