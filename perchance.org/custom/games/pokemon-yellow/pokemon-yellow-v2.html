          this.messageText = this.add
            .text(16, 246, "", {
              fontFamily: "Press Start 2P",
              fontSize: "8px",
              color: "#ffffff",
              wordWrap: { width: 328 },
            })
            .setDepth(20);

          this.optionTitleText = this.add
            .text(202, 263, "", {
              fontFamily: "Press Start 2P",
              fontSize: "7px",
              color: "#f8d030",
            })
            .setDepth(21);

          this.optionTexts = [];
          for (let i = 0; i < 4; i += 1) {
            this.optionTexts.push(
              this.add
                .text(176, 274 + i * 11, "", {
                  fontFamily: "Press Start 2P",
                  fontSize: "7px",
                  color: "#ffffff",
                })
                .setDepth(21),
            );
          }
        }

        stageMultiplier(stage) {
          if (stage >= 0) return (2 + stage) / 2;
          return 2 / (2 - stage);
        }

        getEffectiveStat(pokemon, stages, statKey) {
          const base =
            statKey === "attack"
              ? pokemon.attack
              : statKey === "defense"
                ? pokemon.defense
                : pokemon.speed;

          const stage = stages[statKey] || 0;
          let value = Math.max(1, base * this.stageMultiplier(stage));

          if (statKey === "attack" && pokemon.status === "burn") {
            value *= 0.5;
          }

          if (statKey === "speed" && pokemon.status === "paralysis") {
            value *= 0.5;
          }

          return Math.max(1, value);
        }

        typeMultiplier(moveType, defenderTypes) {
          let total = 1;
          defenderTypes.forEach((defType) => {
            const table = TYPE_CHART[moveType] || {};
            const value = table[defType];
            if (value !== undefined) total *= value;
          });
          return total;
        }

        updateHpBar(bar, current, max) {
          const percent = clamp(current / Math.max(1, max), 0, 1);
          bar.scaleX = percent;
          const color =
            percent > 0.5 ? 0x00ff66 : percent > 0.2 ? 0xffeb3b : 0xff5252;
          bar.setFillStyle(color);
        }

        refreshBattleUi() {
          const player = this.currentPlayerPokemon();
          const enemy = this.currentEnemyPokemon();

          this.enemyNameText.setText(`${displayPokemonName(enemy)} Lv${enemy.level}`);
          this.playerNameText.setText(`${displayPokemonName(player)} Lv${player.level}`);
          this.enemyStatusText.setText(enemy.status === "none" ? "" : enemy.status.toUpperCase());
          this.playerStatusText.setText(
            player.status === "none" ? "" : player.status.toUpperCase(),
          );

          this.enemyHpText.setText(`${enemy.hp}/${enemy.maxHp}`);
          this.playerHpText.setText(`${player.hp}/${player.maxHp}`);

          this.updateHpBar(this.enemyHpBar, enemy.hp, enemy.maxHp);
          this.updateHpBar(this.playerHpBar, player.hp, player.maxHp);

          this.enemySprite.setTexture(speciesTextureKey(enemy.species));
          this.playerSprite.setTexture(speciesTextureKey(player.species));

          this.renderMenu();
        }

        wait(ms) {
          return new Promise((resolve) => this.time.delayedCall(ms, resolve));
        }

        async showMessage(text, duration = 850) {
          this.messageText.setText(text);
          await this.wait(duration);
        }

        setMenuState(state) {
          this.menuState = state;
          this.menuCursor = 0;
          this.menuOffset = 0;

          if (state === "command") {
            this.menuItems = [
              { id: "fight", label: "FIGHT" },
              { id: "bag", label: "BAG" },
              { id: "party", label: "PARTY" },
              { id: "run", label: "RUN" },
            ];
          } else if (state === "moves") {
            const player = this.currentPlayerPokemon();
            this.menuItems = player.moves.map((move, index) => ({
              id: "move",
              moveIndex: index,
              label: `${move.name} ${move.pp}/${move.maxPp}`,
            }));
            this.menuItems.push({ id: "back", label: "BACK" });
          } else if (state === "bag") {
            const inv = this.saveData.inventory;
            this.menuItems = [
              { id: "item", item: "pokeball", label: `POKE BALL x${inv.pokeball}` },
              { id: "item", item: "potion", label: `POTION x${inv.potion}` },
              {
                id: "item",
                item: "superPotion",
                label: `SUPER POTION x${inv.superPotion}`,
              },
              { id: "item", item: "antidote", label: `ANTIDOTE x${inv.antidote}` },
              {
                id: "item",
                item: "paralyzeHeal",
                label: `PARA HEAL x${inv.paralyzeHeal}`,
              },
              { id: "back", label: "BACK" },
            ];
          } else if (state === "party") {
            this.menuItems = this.playerTeam.map((pokemon, index) => {
              const marker = index === this.playerIndex ? "*" : " ";
              const status = pokemon.hp <= 0 ? "FNT" : `${pokemon.hp}/${pokemon.maxHp}`;
              return {
                id: "party",
                partyIndex: index,
                label: `${marker}${displayPokemonName(pokemon)} Lv${pokemon.level} ${status}`,
              };
            });
            this.menuItems.push({ id: "back", label: "BACK" });
          } else {
            this.menuItems = [{ id: "back", label: "BACK" }];
          }

          this.renderMenu();
        }

        renderMenu() {
          const titleMap = {
            command: "ACTION",
            moves: "MOVES",
            bag: "BAG",
            party: "SWITCH",
          };

          this.optionTitleText.setText(titleMap[this.menuState] || "MENU");

          for (let i = 0; i < 4; i += 1) {
            const itemIndex = this.menuOffset + i;
            const item = this.menuItems[itemIndex];
            if (!item) {
              this.optionTexts[i].setText("");
              continue;
            }
            const pointer = itemIndex === this.menuCursor ? ">" : " ";
            this.optionTexts[i].setText(`${pointer} ${item.label}`);
          }
        }

        moveMenuCursor(delta) {
          const maxIndex = this.menuItems.length - 1;
          this.menuCursor = clamp(this.menuCursor + delta, 0, maxIndex);
          if (this.menuCursor < this.menuOffset) {
            this.menuOffset = this.menuCursor;
          }
          if (this.menuCursor > this.menuOffset + 3) {
            this.menuOffset = this.menuCursor - 3;
          }
          this.renderMenu();
        }

        async canActThisTurn(pokemon, isPlayerSide) {
          if (pokemon.status === "sleep") {
            if (pokemon.statusTurns > 0) {
              pokemon.statusTurns -= 1;
              await this.showMessage(`${displayPokemonName(pokemon)} is fast asleep!`, 700);
              return false;
            }
            clearStatus(pokemon);
            await this.showMessage(`${displayPokemonName(pokemon)} woke up!`, 700);
          }

          if (pokemon.status === "paralysis" && Math.random() < 0.25) {
            await this.showMessage(
              `${displayPokemonName(pokemon)} is paralyzed! It cannot move!`,
              700,
            );
            return false;
          }

          return true;
        }

        applyStatus(target, statusName) {
          if (target.status !== "none") return false;
          target.status = statusName;
          target.statusTurns = statusName === "sleep" ? Phaser.Math.Between(1, 3) : 0;
          return true;
        }

        async applyEndTurnStatus(pokemon) {
          if (pokemon.hp <= 0) return;
          if (pokemon.status === "poison" || pokemon.status === "burn") {
            const damage = Math.max(1, Math.floor(pokemon.maxHp / 8));
            pokemon.hp = clamp(pokemon.hp - damage, 0, pokemon.maxHp);
            await this.showMessage(
              `${displayPokemonName(pokemon)} is hurt by ${pokemon.status}!`,
              700,
            );
            this.refreshBattleUi();
          }
        }

        calculateDamage(attacker, defender, moveName, attackerStages, defenderStages) {
          const move = MOVE_DATA[moveName] || MOVE_DATA.Tackle;
          if (move.power <= 0) return { damage: 0, typeMult: 1, stab: 1 };

          const effectiveAttack = this.getEffectiveStat(attacker, attackerStages, "attack");
          const effectiveDefense = this.getEffectiveStat(defender, defenderStages, "defense");

          const base =
            ((2 * attacker.level) / 5 + 2) *
            move.power *
            (effectiveAttack / Math.max(1, effectiveDefense));
          const scaled = base / 50 + 2;
          const random = Phaser.Math.FloatBetween(0.85, 1);
          const stab = attacker.types.includes(move.type) ? 1.5 : 1;
          const typeMult = this.typeMultiplier(move.type, defender.types || []);

          const damage = Math.max(1, Math.floor(scaled * random * stab * typeMult));
          return { damage, typeMult, stab };
        }

        chooseEnemyMove() {
          const enemy = this.currentEnemyPokemon();
          const available = enemy.moves.filter((move) => move.pp > 0);
          if (available.length === 0) return buildMove("Struggle");
          return available[Phaser.Math.Between(0, available.length - 1)];
        }

        async performAttack(
          attacker,
          defender,
          moveRef,
          isPlayerAttack,
          attackerStages,
          defenderStages,
        ) {
          const moveData = MOVE_DATA[moveRef.name] || MOVE_DATA.Struggle;

          if (moveRef.name !== "Struggle" && moveRef.pp <= 0) {
            await this.showMessage(`${moveRef.name} has no PP left!`, 700);
            return;
          }

          const canMove = await this.canActThisTurn(attacker, isPlayerAttack);
          if (!canMove) return;

          if (moveRef.name !== "Struggle") {
            moveRef.pp = clamp(moveRef.pp - 1, 0, moveRef.maxPp);
          }

          await this.showMessage(
            `${displayPokemonName(attacker)} used ${moveRef.name}!`,
            730,
          );

          if (Math.random() * 100 > moveData.accuracy) {
            await this.showMessage("The attack missed!", 650);
            return;
          }

          if (moveData.power > 0) {
            const { damage, typeMult } = this.calculateDamage(
              attacker,
              defender,
              moveRef.name,
              attackerStages,
              defenderStages,
            );

            defender.hp = clamp(defender.hp - damage, 0, defender.maxHp);

            const targetSprite = isPlayerAttack ? this.enemySprite : this.playerSprite;
            this.tweens.add({
              targets: targetSprite,
              x: targetSprite.x + (isPlayerAttack ? 8 : -8),
              yoyo: true,
              duration: 55,
              repeat: 2,
            });

            this.refreshBattleUi();
            await this.wait(260);

            if (typeMult > 1) {
              await this.showMessage("It's super effective!", 620);
            } else if (typeMult > 0 && typeMult < 1) {
              await this.showMessage("It's not very effective...", 620);
            } else if (typeMult === 0) {
              await this.showMessage("It had no effect!", 620);
            }

            if (moveData.recoil) {
              const recoilDamage = Math.max(1, Math.floor(damage * moveData.recoil));
              attacker.hp = clamp(attacker.hp - recoilDamage, 0, attacker.maxHp);
              await this.showMessage(
                `${displayPokemonName(attacker)} was hurt by recoil!`,
                620,
              );
              this.refreshBattleUi();
            }
          }

          if (moveData.status && Math.random() * 100 < moveData.status.chance) {
            if (this.applyStatus(defender, moveData.status.name)) {
              await this.showMessage(
                `${displayPokemonName(defender)} is now ${moveData.status.name}!`,
                680,
              );
            }
          }

          if (moveData.stat && Math.random() * 100 < moveData.stat.chance) {
            const stages = isPlayerAttack ? this.enemyStages : this.playerStages;
            if (moveData.stat.stat === "speed") {
              stages.speed = clamp(stages.speed + moveData.stat.delta, -6, 6);
              await this.showMessage(
                `${displayPokemonName(defender)}'s speed changed!`,
                640,
              );
            }
          }
        }

        async handleEnemyFainted() {
          const defeated = this.currentEnemyPokemon();
          await this.showMessage(`${displayPokemonName(defeated)} fainted!`, 760);

          const winner = this.currentPlayerPokemon();
          const expGain =
            (SPECIES_DATA[defeated.species]?.expYield || 45) + defeated.level * 8;
          const { gainedLevels, learnedMoves } = gainExperience(winner, expGain);
          await this.showMessage(
            `${displayPokemonName(winner)} gained ${expGain} EXP!`,
            860,
          );

          if (gainedLevels > 0) {
            const levelText = `${displayPokemonName(winner)} grew to Lv${winner.level}!`;
            this.levelUpMessages.push(levelText);
            await this.showMessage(levelText, 820);
          }

          if (learnedMoves.length > 0) {
            learnedMoves.forEach((moveName) => {
              const message = `${displayPokemonName(winner)} learned ${moveName}!`;
              this.levelUpMessages.push(message);
            });
            await this.showMessage(
              `${displayPokemonName(winner)} learned ${learnedMoves[0]}!`,
              760,
            );
          }

          const nextEnemy = this.findNextAliveEnemyIndex(this.enemyIndex + 1);
          if (nextEnemy === -1) {
            await this.finishBattle("win");
            return true;
          }

          this.enemyIndex = nextEnemy;
          this.enemyStages = { attack: 0, defense: 0, speed: 0 };
          this.refreshBattleUi();
          await this.showMessage(
            `${this.battleConfig.trainerName} sent out ${displayPokemonName(this.currentEnemyPokemon())}!`,
            860,
          );
          return false;
        }

        async handlePlayerFainted() {
          const fainted = this.currentPlayerPokemon();
          await this.showMessage(`${displayPokemonName(fainted)} fainted!`, 760);

          const next = this.findNextAlivePartyIndex(this.playerIndex + 1);
          if (next === -1) {
            await this.finishBattle("lose", { playerFainted: true });
            return true;
          }

          this.playerIndex = next;
          this.saveData.activeIndex = next;
          this.playerStages = { attack: 0, defense: 0, speed: 0 };
          this.refreshBattleUi();
          await this.showMessage(
            `Go ${displayPokemonName(this.currentPlayerPokemon())}!`,
            820,
          );
          return false;
        }

        async afterActionFaintChecks() {
          if (this.currentEnemyPokemon().hp <= 0) {
            const ended = await this.handleEnemyFainted();
            if (ended) return true;
          }

          if (this.currentPlayerPokemon().hp <= 0) {
            const ended = await this.handlePlayerFainted();
            if (ended) return true;
          }

          return false;
        }

        async applyItem(itemId) {
          const player = this.currentPlayerPokemon();

          if (itemId === "pokeball") {
            if (!this.battleConfig.allowCapture || this.battleConfig.battleType !== "wild") {
              await this.showMessage("You cannot catch trainer Pokemon!", 820);
              return { consumedTurn: false, endedBattle: false };
            }

            if (this.saveData.inventory.pokeball <= 0) {
              await this.showMessage("No Poke Balls left!", 760);
              return { consumedTurn: false, endedBattle: false };
            }

            this.saveData.inventory.pokeball -= 1;
            const enemy = this.currentEnemyPokemon();
            await this.showMessage(
              `Ash threw a Poke Ball at ${displayPokemonName(enemy)}!`,
              860,
            );

            const hpFactor = 1 - enemy.hp / Math.max(1, enemy.maxHp);
            const catchRate = (SPECIES_DATA[enemy.species]?.catchRate || 120) / 255;
            const chance = 0.15 + hpFactor * 0.55 + catchRate * 0.3;
            if (Math.random() < chance) {
              await this.showMessage(`Gotcha! ${enemy.species} was caught!`, 1000);
              await this.finishBattle("caught", {
                capturedPokemon: {
                  ...enemy,
                  hp: enemy.maxHp,
                },
              });
              return { consumedTurn: true, endedBattle: true };
            }

            await this.showMessage(`${enemy.species} broke free!`, 720);
            return { consumedTurn: true, endedBattle: false };
          }

          if (itemId === "potion") {
            if (this.saveData.inventory.potion <= 0) {
              await this.showMessage("No Potions left!", 680);
              return { consumedTurn: false, endedBattle: false };
            }
            if (player.hp >= player.maxHp) {
              await this.showMessage("HP is already full.", 680);
              return { consumedTurn: false, endedBattle: false };
            }
            this.saveData.inventory.potion -= 1;
            player.hp = clamp(player.hp + 20, 0, player.maxHp);
            await this.showMessage(
              `${displayPokemonName(player)} recovered HP with a Potion!`,
              760,
            );
            this.refreshBattleUi();
            return { consumedTurn: true, endedBattle: false };
          }

          if (itemId === "superPotion") {
            if (this.saveData.inventory.superPotion <= 0) {
              await this.showMessage("No Super Potions left!", 680);
              return { consumedTurn: false, endedBattle: false };
            }
            if (player.hp >= player.maxHp) {
              await this.showMessage("HP is already full.", 680);
              return { consumedTurn: false, endedBattle: false };
            }
            this.saveData.inventory.superPotion -= 1;
            player.hp = clamp(player.hp + 50, 0, player.maxHp);
            await this.showMessage(
              `${displayPokemonName(player)} recovered HP with a Super Potion!`,
              760,
            );
            this.refreshBattleUi();
            return { consumedTurn: true, endedBattle: false };
          }

          if (itemId === "antidote") {
            if (this.saveData.inventory.antidote <= 0) {
              await this.showMessage("No Antidotes left!", 680);
              return { consumedTurn: false, endedBattle: false };
            }
            if (player.status !== "poison") {
              await this.showMessage("Your active Pokemon is not poisoned.", 760);
              return { consumedTurn: false, endedBattle: false };
            }
            this.saveData.inventory.antidote -= 1;
            clearStatus(player);
            await this.showMessage(
              `${displayPokemonName(player)} was cured of poison!`,
              760,
            );
            this.refreshBattleUi();
            return { consumedTurn: true, endedBattle: false };
          }

          if (itemId === "paralyzeHeal") {
            if (this.saveData.inventory.paralyzeHeal <= 0) {
              await this.showMessage("No Paralyze Heals left!", 700);
              return { consumedTurn: false, endedBattle: false };
            }
            if (player.status !== "paralysis") {
              await this.showMessage("Your active Pokemon is not paralyzed.", 780);
              return { consumedTurn: false, endedBattle: false };
            }
            this.saveData.inventory.paralyzeHeal -= 1;
            clearStatus(player);
            await this.showMessage(
              `${displayPokemonName(player)} is no longer paralyzed!`,
              760,
            );
            this.refreshBattleUi();
            return { consumedTurn: true, endedBattle: false };
          }

          return { consumedTurn: false, endedBattle: false };
        }

        async switchPartyMember(targetIndex) {
          if (targetIndex === this.playerIndex) {
            await this.showMessage("That Pokemon is already battling.", 680);
            return false;
          }

          const target = this.playerTeam[targetIndex];
          if (!target || target.hp <= 0) {
            await this.showMessage("You cannot switch to a fainted Pokemon.", 760);
            return false;
          }

          this.playerIndex = targetIndex;
          this.saveData.activeIndex = targetIndex;
          this.playerStages = { attack: 0, defense: 0, speed: 0 };
          this.refreshBattleUi();
          await this.showMessage(`Go ${displayPokemonName(target)}!`, 780);
          return true;
        }

        async attemptRun() {
          if (!this.battleConfig.canRun) {
            await this.showMessage("You cannot run from this battle!", 760);
            return { consumedTurn: false, endedBattle: false };
          }

          const player = this.currentPlayerPokemon();
          const enemy = this.currentEnemyPokemon();
          const playerSpeed = this.getEffectiveStat(player, this.playerStages, "speed");
          const enemySpeed = this.getEffectiveStat(enemy, this.enemyStages, "speed");
          const runChance =
            0.35 + clamp((playerSpeed - enemySpeed) / Math.max(1, enemySpeed), -0.2, 0.35);

          if (Math.random() < runChance) {
            await this.showMessage("Got away safely!", 700);
            await this.finishBattle("run");
            return { consumedTurn: true, endedBattle: true };
          }

          await this.showMessage("Could not escape!", 700);
          return { consumedTurn: true, endedBattle: false };
        }

        async runEnemyAction() {
          if (this.battleEnded) return;
          const enemy = this.currentEnemyPokemon();
          const player = this.currentPlayerPokemon();
          const moveRef = this.chooseEnemyMove();

          await this.performAttack(
            enemy,
            player,
            moveRef,
            false,
            this.enemyStages,
            this.playerStages,
          );

          if (await this.afterActionFaintChecks()) return;
        }

        async runTurnWithPlayerAttack(moveIndex) {
          const player = this.currentPlayerPokemon();
          const enemy = this.currentEnemyPokemon();
          const playerMove = player.moves[moveIndex] || buildMove("Struggle");
          const enemyMove = this.chooseEnemyMove();

          const playerSpeed = this.getEffectiveStat(player, this.playerStages, "speed");
          const enemySpeed = this.getEffectiveStat(enemy, this.enemyStages, "speed");

          const order =
            playerSpeed >= enemySpeed
              ? ["player", "enemy"]
              : ["enemy", "player"];

          for (const actor of order) {
            if (this.battleEnded) return;

            if (actor === "player") {
              if (player.hp <= 0) continue;
              await this.performAttack(
                player,
                this.currentEnemyPokemon(),
                playerMove,
                true,
                this.playerStages,
                this.enemyStages,
              );
            } else {
              if (this.currentEnemyPokemon().hp <= 0) continue;
              await this.performAttack(
                this.currentEnemyPokemon(),
                this.currentPlayerPokemon(),
                enemyMove,
                false,
                this.enemyStages,
                this.playerStages,
              );
            }

            const ended = await this.afterActionFaintChecks();
            if (ended) return;
          }

          await this.applyEndTurnStatus(this.currentPlayerPokemon());
          if (await this.afterActionFaintChecks()) return;

          await this.applyEndTurnStatus(this.currentEnemyPokemon());
          if (await this.afterActionFaintChecks()) return;

          this.refreshBattleUi();
        }

        async executeChosenItem(itemId) {
          const { consumedTurn, endedBattle } = await this.applyItem(itemId);
          this.refreshBattleUi();
          if (endedBattle) return;
          if (!consumedTurn) {
            this.inputEnabled = true;
            this.setMenuState("bag");
            this.messageText.setText("Choose an item.");
            return;
          }

          await this.runEnemyAction();
          if (this.battleEnded) return;

          await this.applyEndTurnStatus(this.currentPlayerPokemon());
          if (await this.afterActionFaintChecks()) return;

          await this.applyEndTurnStatus(this.currentEnemyPokemon());
          if (await this.afterActionFaintChecks()) return;
        }

        async chooseMenuItem() {
          const item = this.menuItems[this.menuCursor];
          if (!item) return;

          if (this.menuState === "command") {
            if (item.id === "fight") {
              this.setMenuState("moves");
              this.messageText.setText("Choose a move.");
              return;
            }

            if (item.id === "bag") {
              this.setMenuState("bag");
              this.messageText.setText("Use an item.");
              return;
            }

            if (item.id === "party") {
              this.setMenuState("party");
              this.messageText.setText("Choose a Pokemon.");
              return;
            }

            if (item.id === "run") {
              this.inputEnabled = false;
              const { consumedTurn, endedBattle } = await this.attemptRun();
              if (endedBattle) return;

              if (!consumedTurn) {
                this.inputEnabled = true;
                this.messageText.setText("Choose an action.");
                return;
              }

              await this.runEnemyAction();
              if (this.battleEnded) return;
              this.inputEnabled = true;
              this.messageText.setText("Choose an action.");
              return;
            }
          }

          if (this.menuState === "moves") {
            if (item.id === "back") {
              this.setMenuState("command");
              this.messageText.setText("Choose an action.");
              return;
            }

            this.inputEnabled = false;
            await this.runTurnWithPlayerAttack(item.moveIndex);
            if (this.battleEnded) return;

            this.setMenuState("command");
            this.inputEnabled = true;
            this.messageText.setText("Choose an action.");
            return;
          }

          if (this.menuState === "bag") {
            if (item.id === "back") {
              this.setMenuState("command");
              this.messageText.setText("Choose an action.");
              return;
            }

            this.inputEnabled = false;
            await this.executeChosenItem(item.item);
            if (this.battleEnded) return;

            this.setMenuState("command");
            this.inputEnabled = true;
            this.messageText.setText("Choose an action.");
            return;
          }

          if (this.menuState === "party") {
            if (item.id === "back") {
              this.setMenuState("command");
              this.messageText.setText("Choose an action.");
              return;
            }

            this.inputEnabled = false;
            const switched = await this.switchPartyMember(item.partyIndex);
            if (!switched) {
              this.inputEnabled = true;
              this.setMenuState("party");
              this.messageText.setText("Choose a Pokemon.");
              return;
            }

            await this.runEnemyAction();
            if (this.battleEnded) return;

            this.setMenuState("command");
            this.inputEnabled = true;
            this.messageText.setText("Choose an action.");
          }
        }

        async finishBattle(result, extra = {}) {
          if (this.battleEnded) return;
          this.battleEnded = true;
          this.inputEnabled = false;

          this.saveData.activeIndex = this.playerIndex;
          this.registry.set("saveData", this.saveData);
          this.registry.set("pendingBattleResult", {
            result,
            seenSpecies: this.enemyTeam.map((pokemon) => pokemon.species),
            moneyReward: result === "win" ? this.battleConfig.moneyReward : 0,
            flagOnWin: result === "win" ? this.battleConfig.flagOnWin : null,
            badgeOnWin: result === "win" ? this.battleConfig.badgeOnWin : null,
            levelUpMessages: this.levelUpMessages.slice(),
            ...extra,
          });

          await this.wait(360);
          this.scene.stop();
          this.scene.resume("WorldScene");
        }

        update() {
          if (this.battleEnded || !this.inputEnabled) return;

          const upTap = Phaser.Input.Keyboard.JustDown(this.keys.up) || consumeTap("up");
          const downTap =
            Phaser.Input.Keyboard.JustDown(this.keys.down) || consumeTap("down");
          const leftTap =
            Phaser.Input.Keyboard.JustDown(this.keys.left) || consumeTap("left");
          const rightTap =
            Phaser.Input.Keyboard.JustDown(this.keys.right) || consumeTap("right");
          const aTap = Phaser.Input.Keyboard.JustDown(this.keys.a) || consumeTap("a");
          const bTap = Phaser.Input.Keyboard.JustDown(this.keys.b) || consumeTap("b");

          if (upTap) {
            this.moveMenuCursor(-1);
            return;
          }

          if (downTap) {
            this.moveMenuCursor(1);
            return;
          }

          if (leftTap) {
            this.moveMenuCursor(-1);
            return;
          }

          if (rightTap) {
            this.moveMenuCursor(1);
            return;
          }

          if (aTap) {
            this.chooseMenuItem();
            return;
          }

          if (bTap) {
            if (this.menuState !== "command") {
              this.setMenuState("command");
              this.messageText.setText("Choose an action.");
            }
          }
        }
      }

      class MenuScene extends Phaser.Scene {
        constructor() {
          super({ key: "MenuScene" });
          this.mode = "main";
          this.cursor = 0;
          this.partyCursor = 0;
          this.partyActionCursor = 0;
          this.selectedPartyIndex = 0;
          this.mainOptions = [
            "PARTY MANAGER",
            "BAG",
            "TRAINER CARD",
            "SAVE",
            "EXIT",
          ];
          this.partyActions = [
            "SET LEAD",
            "MOVE UP",
            "MOVE DOWN",
            "NICKNAME",
            "USE POTION",
            "CURE STATUS",
            "BACK",
          ];
        }

        create() {
          this.saveData = normalizeSave(this.registry.get("saveData"));

          this.add.rectangle(180, 160, 360, 320, 0x000000, 0.84).setDepth(1);
          this.add
            .text(82, 20, "TRAINER MENU V2", {
              fontFamily: "Press Start 2P",
              fontSize: "14px",
              color: "#f8d030",
            })
            .setDepth(2);

          this.leftTitleText = this.add
            .text(24, 52, "", {
              fontFamily: "Press Start 2P",
              fontSize: "8px",
              color: "#f8d030",
            })
            .setDepth(2);

          this.listTexts = [];
          for (let i = 0; i < 9; i += 1) {
            this.listTexts.push(
              this.add
                .text(24, 68 + i * 18, "", {
                  fontFamily: "Press Start 2P",
                  fontSize: "8px",
                  color: "#ffffff",
                })
                .setDepth(2),
            );
          }

          this.detailsText = this.add
            .text(178, 62, "", {
              fontFamily: "Press Start 2P",
              fontSize: "8px",
              color: "#e0f8e0",
              wordWrap: { width: 165 },
            })
            .setDepth(2);

          this.helpText = this.add
            .text(20, 292, "A/Z: Select  B/X: Back  START: Close", {
              fontFamily: "Press Start 2P",
              fontSize: "7px",
              color: "#9bc89b",
            })
            .setDepth(2);

          this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            a: Phaser.Input.Keyboard.KeyCodes.Z,
            b: Phaser.Input.Keyboard.KeyCodes.X,
            start: Phaser.Input.Keyboard.KeyCodes.ENTER,
          });

          this.render();
        }

        persistAndRefresh() {
          this.registry.set("saveData", this.saveData);
          this.render();
        }

        closeMenu() {
          this.registry.set("saveData", this.saveData);
          this.scene.stop();
          this.scene.resume("WorldScene");
        }

        getPartyLines() {
          if (this.saveData.party.length === 0) {
            return ["No Pokemon in party."];
          }

          return this.saveData.party.map((pokemon, index) => {
            const leadMarker = index === this.saveData.activeIndex ? "*" : " ";
            const status = pokemon.status !== "none" ? ` ${pokemon.status.toUpperCase()}` : "";
            return `${leadMarker}${displayPokemonName(pokemon)} Lv${pokemon.level} ${pokemon.hp}/${pokemon.maxHp}${status}`;
          });
        }

        renderMainMode() {
          this.leftTitleText.setText("MAIN");
          this.listTexts.forEach((text, i) => {
            if (i < this.mainOptions.length) {
              const marker = i === this.cursor ? ">" : " ";
              text.setText(`${marker} ${this.mainOptions[i]}`);
            } else {
              text.setText("");
            }
          });

          const seen = Object.keys(this.saveData.pokedex.seen).length;
          const caught = Object.keys(this.saveData.pokedex.caught).length;
          const badgeLine = this.saveData.badges.length
            ? this.saveData.badges.join("\n")
            : "No badges yet";

          this.detailsText.setText(
            [
              `Name: ${this.saveData.playerName}`,
              `Money: $${this.saveData.money}`,
              `Badges: ${this.saveData.badges.length}/3`,
              `Seen/Caught: ${seen}/${caught}`,
              "",
              badgeLine,
            ].join("\n"),
          );
        }

        renderPartyMode() {
          this.leftTitleText.setText("PARTY MANAGER");
          const lines = this.getPartyLines();
          this.partyCursor = clamp(this.partyCursor, 0, Math.max(0, lines.length - 1));

          this.listTexts.forEach((text, i) => {
            if (i < lines.length) {
              const marker = i === this.partyCursor ? ">" : " ";
              text.setText(`${marker} ${lines[i]}`);
            } else if (i === lines.length) {
              const marker = this.partyCursor === lines.length ? ">" : " ";
              text.setText(`${marker} BACK`);
            } else {
              text.setText("");
            }
          });

          const selected = this.saveData.party[this.partyCursor];
          if (!selected) {
            this.detailsText.setText("Select BACK to return.");
            return;
          }

          const moveLines = selected.moves.map(
            (move) => `${move.name} ${move.pp}/${move.maxPp}`,
          );
          this.detailsText.setText(
            [
              `Species: ${selected.species}`,
              `Nickname: ${displayPokemonName(selected)}`,
              `Types: ${(selected.types || []).join("/")}`,
              `Status: ${selected.status}`,
              "",
              ...moveLines,
            ].join("\n"),
          );
        }

        renderPartyActionMode() {
          this.leftTitleText.setText("PARTY ACTION");
          const pokemon = this.saveData.party[this.selectedPartyIndex];
          this.partyActionCursor = clamp(
            this.partyActionCursor,
            0,
            this.partyActions.length - 1,
          );

          this.listTexts.forEach((text, i) => {
            if (i < this.partyActions.length) {
              const marker = i === this.partyActionCursor ? ">" : " ";
              text.setText(`${marker} ${this.partyActions[i]}`);
            } else {
              text.setText("");
            }
          });

          if (!pokemon) {
            this.detailsText.setText("No Pokemon selected.");
            return;
          }

          this.detailsText.setText(
            [
              `${displayPokemonName(pokemon)} Lv${pokemon.level}`,
              `HP ${pokemon.hp}/${pokemon.maxHp}`,
              `Status: ${pokemon.status}`,
              `ATK ${pokemon.attack} DEF ${pokemon.defense} SPD ${pokemon.speed}`,
            ].join("\n"),
          );
        }

        renderBagMode() {
          this.leftTitleText.setText("BAG");
          const inv = this.saveData.inventory;
          const lines = [
            `Poke Ball x${inv.pokeball}`,
            `Potion x${inv.potion}`,
            `Super Potion x${inv.superPotion}`,
            `Antidote x${inv.antidote}`,
            `Paralyze Heal x${inv.paralyzeHeal}`,
            "BACK",
          ];

          this.cursor = clamp(this.cursor, 0, lines.length - 1);
          this.listTexts.forEach((text, i) => {
            if (i < lines.length) {
              const marker = i === this.cursor ? ">" : " ";
              text.setText(`${marker} ${lines[i]}`);
            } else {
              text.setText("");
            }
          });

          this.detailsText.setText(
            [
              "Bag items can be used in battles.",
              "Potions and status cures can also be applied",
              "from Party Manager actions.",
            ].join("\n"),
          );
        }

        renderTrainerCardMode() {
          this.leftTitleText.setText("TRAINER CARD");
          const seen = Object.keys(this.saveData.pokedex.seen).length;
          const caught = Object.keys(this.saveData.pokedex.caught).length;

          const badgeLines = BADGE_ORDER.map((badge) => {
            const check = this.saveData.badges.includes(badge) ? "[X]" : "[ ]";
            return `${check} ${badge}`;
          });

          this.listTexts.forEach((text, i) => {
            if (i < badgeLines.length) {
              text.setText(badgeLines[i]);
            } else if (i === badgeLines.length) {
              text.setText("> BACK");
            } else {
              text.setText("");
            }
          });

          this.detailsText.setText(
            [
              `Trainer: ${this.saveData.playerName}`,
              `Money: $${this.saveData.money}`,
              `Party: ${this.saveData.party.length}`,
              `Seen: ${seen}`,
              `Caught: ${caught}`,
            ].join("\n"),
          );
        }

        render() {
          if (this.mode === "main") {
            this.renderMainMode();
            return;
          }

          if (this.mode === "party") {
            this.renderPartyMode();
            return;
          }

          if (this.mode === "partyAction") {
            this.renderPartyActionMode();
            return;
          }

          if (this.mode === "bag") {
            this.renderBagMode();
            return;
          }

          if (this.mode === "trainer") {
            this.renderTrainerCardMode();
          }
        }

        performPartyAction() {
          const pokemon = this.saveData.party[this.selectedPartyIndex];
          if (!pokemon) {
            this.mode = "party";
            this.render();
            return;
          }

          const action = this.partyActions[this.partyActionCursor];

          if (action === "SET LEAD") {
            this.saveData.activeIndex = this.selectedPartyIndex;
            this.persistAndRefresh();
            this.detailsText.setText("Lead Pokemon updated.");
            return;
          }

          if (action === "MOVE UP") {
            if (this.selectedPartyIndex <= 0) {
              this.detailsText.setText("Already at top slot.");
              return;
            }

            const idx = this.selectedPartyIndex;
            const swap = this.saveData.party[idx - 1];
            this.saveData.party[idx - 1] = this.saveData.party[idx];
            this.saveData.party[idx] = swap;

            if (this.saveData.activeIndex === idx) this.saveData.activeIndex = idx - 1;
            else if (this.saveData.activeIndex === idx - 1)
              this.saveData.activeIndex = idx;

            this.selectedPartyIndex -= 1;
            this.partyCursor = this.selectedPartyIndex;
            this.persistAndRefresh();
            return;
          }

          if (action === "MOVE DOWN") {
            if (this.selectedPartyIndex >= this.saveData.party.length - 1) {
              this.detailsText.setText("Already at bottom slot.");
              return;
            }

            const idx = this.selectedPartyIndex;
            const swap = this.saveData.party[idx + 1];
            this.saveData.party[idx + 1] = this.saveData.party[idx];
            this.saveData.party[idx] = swap;

            if (this.saveData.activeIndex === idx) this.saveData.activeIndex = idx + 1;
            else if (this.saveData.activeIndex === idx + 1)
              this.saveData.activeIndex = idx;

            this.selectedPartyIndex += 1;
            this.partyCursor = this.selectedPartyIndex;
            this.persistAndRefresh();
            return;
          }

          if (action === "NICKNAME") {
            const currentName = pokemon.nickname || pokemon.species;
            const nextName = window.prompt("Enter nickname (max 12 chars):", currentName);
            if (nextName === null) {
              this.detailsText.setText("Nickname canceled.");
              return;
            }

            const cleaned = String(nextName).trim().slice(0, 12);
            pokemon.nickname = cleaned.toLowerCase() === pokemon.species.toLowerCase() ? "" : cleaned;
            this.persistAndRefresh();
            return;
          }

          if (action === "USE POTION") {
            if (pokemon.hp >= pokemon.maxHp) {
              this.detailsText.setText("HP is already full.");
              return;
            }

            if (this.saveData.inventory.superPotion > 0) {
              this.saveData.inventory.superPotion -= 1;
              pokemon.hp = clamp(pokemon.hp + 50, 0, pokemon.maxHp);
              this.persistAndRefresh();
              this.detailsText.setText("Used Super Potion.");
              return;
            }

            if (this.saveData.inventory.potion > 0) {
              this.saveData.inventory.potion -= 1;
              pokemon.hp = clamp(pokemon.hp + 20, 0, pokemon.maxHp);
              this.persistAndRefresh();
              this.detailsText.setText("Used Potion.");
              return;
            }

            this.detailsText.setText("No Potions available.");
            return;
          }

          if (action === "CURE STATUS") {
            if (pokemon.status === "none") {
              this.detailsText.setText("No status condition to cure.");
              return;
            }

            if (pokemon.status === "poison") {
              if (this.saveData.inventory.antidote <= 0) {
                this.detailsText.setText("No Antidote available.");
                return;
              }
              this.saveData.inventory.antidote -= 1;
              clearStatus(pokemon);
              this.persistAndRefresh();
              this.detailsText.setText("Poison cured with Antidote.");
              return;
            }

            if (pokemon.status === "paralysis") {
              if (this.saveData.inventory.paralyzeHeal <= 0) {
                this.detailsText.setText("No Paralyze Heal available.");
                return;
              }
              this.saveData.inventory.paralyzeHeal -= 1;
              clearStatus(pokemon);
              this.persistAndRefresh();
              this.detailsText.setText("Paralysis cured.");
              return;
            }

            clearStatus(pokemon);
            this.persistAndRefresh();
            this.detailsText.setText("Status cleared.");
            return;
          }

          if (action === "BACK") {
            this.mode = "party";
            this.render();
          }
        }

        performMainSelection() {
          const selected = this.mainOptions[this.cursor];

          if (selected === "PARTY MANAGER") {
            this.mode = "party";
            this.partyCursor = 0;
            this.render();
            return;
          }

          if (selected === "BAG") {
            this.mode = "bag";
            this.cursor = 0;
            this.render();
            return;
          }

          if (selected === "TRAINER CARD") {
            this.mode = "trainer";
            this.render();
            return;
          }

          if (selected === "SAVE") {
            this.registry.set("saveData", this.saveData);
            saveGame(this.saveData).then((ok) => {
              this.detailsText.setText(ok ? "Game saved successfully." : "Save failed.");
            });
            return;
          }

          if (selected === "EXIT") {
            this.closeMenu();
          }
        }

        update() {
          const upTap = Phaser.Input.Keyboard.JustDown(this.keys.up) || consumeTap("up");
          const downTap =
            Phaser.Input.Keyboard.JustDown(this.keys.down) || consumeTap("down");
          const aTap = Phaser.Input.Keyboard.JustDown(this.keys.a) || consumeTap("a");
          const bTap = Phaser.Input.Keyboard.JustDown(this.keys.b) || consumeTap("b");
          const startTap =
            Phaser.Input.Keyboard.JustDown(this.keys.start) || consumeTap("start");

          if (startTap && this.mode === "main") {
            this.closeMenu();
            return;
          }

          if (this.mode === "main") {
            if (upTap) {
              this.cursor = (this.cursor - 1 + this.mainOptions.length) % this.mainOptions.length;
              this.render();
              return;
            }
            if (downTap) {
              this.cursor = (this.cursor + 1) % this.mainOptions.length;
              this.render();
              return;
            }
            if (aTap) {
              this.performMainSelection();
              return;
            }
            if (bTap) {
              this.closeMenu();
            }
            return;
          }

          if (this.mode === "party") {
            const maxIndex = this.getPartyLines().length;
            if (upTap) {
              this.partyCursor = (this.partyCursor - 1 + (maxIndex + 1)) % (maxIndex + 1);
              this.render();
              return;
            }
            if (downTap) {
              this.partyCursor = (this.partyCursor + 1) % (maxIndex + 1);
              this.render();
              return;
            }
            if (aTap) {
              if (this.partyCursor >= this.saveData.party.length) {
                this.mode = "main";
                this.render();
                return;
              }
              this.selectedPartyIndex = this.partyCursor;
              this.partyActionCursor = 0;
              this.mode = "partyAction";
              this.render();
              return;
            }
            if (bTap || startTap) {
              this.mode = "main";
              this.render();
            }
            return;
          }

          if (this.mode === "partyAction") {
            if (upTap) {
              this.partyActionCursor =
                (this.partyActionCursor - 1 + this.partyActions.length) %
                this.partyActions.length;
              this.render();
              return;
            }
            if (downTap) {
              this.partyActionCursor = (this.partyActionCursor + 1) % this.partyActions.length;
              this.render();
              return;
            }
            if (aTap) {
              this.performPartyAction();
              return;
            }
            if (bTap || startTap) {
              this.mode = "party";
              this.render();
            }
            return;
          }

          if (this.mode === "bag") {
            const bagLength = 6;
            if (upTap) {
              this.cursor = (this.cursor - 1 + bagLength) % bagLength;
              this.render();
              return;
            }
            if (downTap) {
              this.cursor = (this.cursor + 1) % bagLength;
              this.render();
              return;
            }
            if (aTap || bTap || startTap) {
              this.mode = "main";
              this.render();
            }
            return;
          }

          if (this.mode === "trainer") {
            if (aTap || bTap || startTap) {
              this.mode = "main";
              this.render();
            }
          }
        }
      }

      window.addEventListener("load", () => {
        new YellowV2Game();
      });

      window.addEventListener("keydown", (event) => {
        const map = {
          ArrowUp: "up",
          ArrowDown: "down",
          ArrowLeft: "left",
          ArrowRight: "right",
          KeyZ: "a",
          KeyX: "b",
          Enter: "start",
        };

        const key = map[event.code];
        if (!key) return;
        event.preventDefault();
        markPressed(key, event.repeat);
      });

      window.addEventListener("keyup", (event) => {
        const map = {
          ArrowUp: "up",
          ArrowDown: "down",
          ArrowLeft: "left",
          ArrowRight: "right",
          KeyZ: "a",
          KeyX: "b",
          Enter: "start",
        };

        const key = map[event.code];
        if (key) {
          markReleased(key);
        }
      });

      window.addEventListener("blur", () => {
        Object.keys(inputState).forEach((key) => {
          inputState[key] = false;
        });
      });
    </script>
  </body>
</html>
