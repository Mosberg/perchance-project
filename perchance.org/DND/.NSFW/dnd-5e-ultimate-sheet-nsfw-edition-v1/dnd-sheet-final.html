<!doctype html>
<html lang="en" data-theme="dark" data-parchment="off">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D&D 5e Ultimate Character Sheet - NSFW Edition</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=clash_display@500,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link
      rel="stylesheet"
      href="https://mosberg.github.io/src/styles/styling.css"
    />
    <style>
      #ageGate {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        color: white;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .app-shell {
        transition: filter 0.5s;
      }
    </style>
  </head>
  <body>
    <div id="ageGate">
      <h1>⚠️ Warning: Adult Content</h1>
      <p
        style="
          font-size: 1.2rem;
          max-width: 600px;
          margin-bottom: 30px;
          line-height: 1.6;
        "
      >
        This interactive sheet contains <strong>explicit NSFW content</strong>,
        sexual themes, detailed anatomy descriptions, and adult-oriented
        character generation for D&D 5e.
      </p>
      <p style="font-size: 1rem; color: #888; margin-bottom: 30px">
        By entering, you confirm you are 18+.
      </p>
      <button
        id="enterSiteBtn"
        class="btn btn-primary"
        style="font-size: 1.5rem; padding: 15px 40px"
      >
        I am 18+ & Enter
      </button>
    </div>

    <div
      class="app-shell"
      id="dndSheet"
      style="filter: blur(5px); pointer-events: none"
    >
      <div class="topbar">
        <h1>D&D 5e Ultimate Sheet - NSFW Edition</h1>
        <div class="toolbar">
          <span id="saveStatus"></span>
          <button id="newSheetBtn">New Character</button>
          <button id="randomizeBtn">Randomize</button>
          <button id="openSettingsBtn">Settings</button>
        </div>
      </div>
      <div id="main" class="container mt-4">
        <div class="row">
          <div class="col-md-6">
            <label>Character Name</label>
            <input
              type="text"
              id="charName"
              class="form-control autosync"
              placeholder="e.g. Lyanna"
            />
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const enterSiteBtn = document.getElementById("enterSiteBtn");
      const ageGate = document.getElementById("ageGate");
      const dndSheet = document.getElementById("dndSheet");

      enterSiteBtn.addEventListener("click", () => {
        ageGate.style.display = "none";
        dndSheet.style.filter = "none";
        dndSheet.style.pointerEvents = "auto";
      });

      // Essential Logic
      const ABILITIES = ["str", "dex", "con", "int", "wis", "cha"];
      const recalc = () => {
        console.log("Recalculating...");
      };
      function randomizeSheet() {
        document.getElementById("charName").value = [
          "Arin",
          "Belwyn",
          "Cade",
          "Dorian",
        ][Math.floor(Math.random() * 4)];
        recalc();
      }
      document.getElementById("randomizeBtn").onclick = randomizeSheet;
      document
        .querySelectorAll(".autosync")
        .forEach((el) => el.addEventListener("input", recalc));
    </script>
  </body>
</html>
