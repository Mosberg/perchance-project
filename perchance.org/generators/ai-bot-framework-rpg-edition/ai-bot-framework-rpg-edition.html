<div hidden>[rpgControl()]</div>

<header class="hero">
  <h1>[root.pageTitle]</h1>
  <p>[root.pageSubtitle]</p>
</header>

<main class="layout">
  <section class="panel commandDeck">
    <h2>Framework Deck</h2>
    <div id="bridgeBadge" class="badge unknown">Bridge status: checking...</div>

    <div class="actions">
      <button onclick="openControlCenter()">Open Control Center</button>
      <button onclick="runFrameworkCommand('/status')" data-variant="soft">
        Run /status
      </button>
      <button onclick="warmupSafe()" data-variant="soft">Warmup Safe</button>
      <button
        onclick="runFrameworkCommand('/feature list')"
        data-variant="soft"
      >
        Feature List
      </button>
    </div>

    <div class="commandRow">
      <input id="frameworkCommandEl" placeholder="/sync status" />
      <button onclick="runCustomFrameworkCommand()">Run Command</button>
    </div>

    <div class="smallTitle">Framework Snapshot</div>
    <pre id="frameworkSnapshotEl">Waiting for framework snapshot...</pre>
  </section>

  <section class="panel storyDeck">
    <h2>World Setup</h2>
    <textarea id="worldSeedEl" class="seedBox">
[root.defaultWorldSeed]</textarea
    >

    <h2>Story Log</h2>
    <textarea
      id="storyLogEl"
      class="storyBox"
      placeholder="Session history appears here..."
    ></textarea>

    <div class="turnRow">
      <input
        id="actionInputEl"
        placeholder="What does the player do next?"
        onkeydown="
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            generateTurn();
          }
        "
      />
      <button id="generateBtn" onclick="generateTurn()">Generate Turn</button>
      <button id="stopBtn" data-variant="danger" onclick="stopGeneration()">
        Stop
      </button>
    </div>

    <div class="historyRow">
      <button onclick="undoLastTurn()" data-variant="soft">Undo Last</button>
      <button onclick="clearSession()" data-variant="soft">
        Clear Session
      </button>
      <span id="statusEl" class="statusText">Ready.</span>
      <span class="fullscreenBtn">[fullscreenButton("⛶", "🗗")]</span>
    </div>

    <div class="smallTitle">Incoming Output Preview</div>
    <pre id="previewEl"></pre>
  </section>
</main>

<script id="gmInstructionText" type="text/plain">
  [root.frameworkInstruction]
</script>

<script>
  let activeGeneration = null;
  let storyBeforeTurn = "";
  const STORAGE_WORLD = "bfrpg_world_seed_v1";
  const STORAGE_LOG = "bfrpg_story_log_v1";
  const STORAGE_FRAMEWORK = "bfrpg_framework_state_v1";

  function setStatus(text, tone) {
    statusEl.textContent = text;
    statusEl.dataset.tone = tone || "normal";
  }

  function defaultFeatureFlags() {
    return {
      commandRouter: true,
      messageRefiner: true,
      hiddenContextInjector: true,
      webContextFetcher: false,
      interactiveButtons: true,
      sceneController: true,
      streamingBrowserTts: false,
      pyodideCodeRunner: false,
      memorySummarizer: true,
      jsonToolRouter: true,
      adminOverlay: true,
    };
  }

  function createDefaultFrameworkState() {
    return {
      version: "local-bridge-1.0.0",
      world: {
        mode: "adventure",
        turn: 1,
      },
      players: {
        player1: {
          id: "player1",
          name: "Field Tactician",
          activeQuestId: null,
        },
      },
      quests: {},
      combat: {},
      config: {
        typingSpeed: 1,
        eventChance: 0.12,
        eventCooldownMs: 1200,
        buttonBarChance: 0.45,
        maxEnergy: 100,
        maxInventory: 40,
        maxWebContextChars: 3000,
        webContextTimeoutMs: 15000,
        features: defaultFeatureFlags(),
      },
      perf: {
        enabled: false,
        samples: [],
        lastSampleAt: null,
      },
      multiplayer: {
        enabled: false,
        roomId: "",
        conflictPolicy: "local-wins",
        lastSyncAt: null,
      },
      ops: {
        profile: "safe",
        saves: 0,
        lastCommand: null,
        lastCommandAt: null,
      },
    };
  }

  function mergeFrameworkState(parsed) {
    const base = createDefaultFrameworkState();
    const next = {
      ...base,
      ...(parsed || {}),
      world: { ...base.world, ...((parsed && parsed.world) || {}) },
      players: { ...base.players, ...((parsed && parsed.players) || {}) },
      quests: { ...base.quests, ...((parsed && parsed.quests) || {}) },
      combat: { ...base.combat, ...((parsed && parsed.combat) || {}) },
      config: {
        ...base.config,
        ...((parsed && parsed.config) || {}),
        features: {
          ...base.config.features,
          ...((parsed && parsed.config && parsed.config.features) || {}),
        },
      },
      perf: { ...base.perf, ...((parsed && parsed.perf) || {}) },
      multiplayer: {
        ...base.multiplayer,
        ...((parsed && parsed.multiplayer) || {}),
      },
      ops: { ...base.ops, ...((parsed && parsed.ops) || {}) },
    };

    const ids = Object.keys(next.players || {});
    if (!ids.length) {
      next.players = base.players;
    }

    Object.keys(next.players).forEach((id) => {
      if (!next.players[id] || typeof next.players[id] !== "object") {
        next.players[id] = { id, name: "Player", activeQuestId: null };
      }
      if (!next.players[id].id) next.players[id].id = id;
    });

    return next;
  }

  function loadFrameworkStateFromStorage() {
    const raw = localStorage.getItem(STORAGE_FRAMEWORK);
    if (!raw) return createDefaultFrameworkState();
    try {
      const parsed = JSON.parse(raw);
      return mergeFrameworkState(parsed);
    } catch (err) {
      console.warn("Failed to parse local framework state:", err);
      return createDefaultFrameworkState();
    }
  }

  function saveFrameworkStateToStorage(state) {
    try {
      localStorage.setItem(STORAGE_FRAMEWORK, JSON.stringify(state));
    } catch (err) {
      console.warn("Failed to save local framework state:", err);
    }
  }

  function ensureOcCarrier(state) {
    if (!window.oc || typeof window.oc !== "object") window.oc = {};
    if (!window.oc.thread || typeof window.oc.thread !== "object") {
      window.oc.thread = {};
    }
    if (!Array.isArray(window.oc.thread.messages)) {
      window.oc.thread.messages = [];
    }
    window.oc.thread.customData = state;
  }

  function setNestedValue(target, path, value) {
    const parts = String(path || "")
      .split(".")
      .filter(Boolean);
    if (!parts.length) return false;

    let cursor = target;
    for (let i = 0; i < parts.length - 1; i += 1) {
      const key = parts[i];
      if (!cursor[key] || typeof cursor[key] !== "object") cursor[key] = {};
      cursor = cursor[key];
    }

    cursor[parts[parts.length - 1]] = value;
    return true;
  }

  function parseSettingValue(raw) {
    const text = String(raw || "").trim();
    if (text === "") return "";
    if (text === "true") return true;
    if (text === "false") return false;
    if (text === "null") return null;
    if (/^-?\d+(\.\d+)?$/.test(text)) return Number(text);

    try {
      return JSON.parse(text);
    } catch {
      return text.replace(/^"|"$/g, "");
    }
  }

  function installLocalFrameworkBridgeIfNeeded() {
    if (typeof window.__bf_cmd === "function") {
      window.__bfrpgBridgeSource = "framework";
      return;
    }

    const state = loadFrameworkStateFromStorage();
    ensureOcCarrier(state);

    function persistState() {
      saveFrameworkStateToStorage(state);
      ensureOcCarrier(state);
    }

    function getActivePlayer() {
      const ids = Object.keys(state.players || {});
      const id = ids[0] || "player1";
      if (!state.players[id]) {
        state.players[id] = { id, name: "Player", activeQuestId: null };
      }
      return state.players[id];
    }

    function applyProfile(profileName) {
      const profile = String(profileName || "safe").toLowerCase();
      const features = state.config.features;
      const defaults = defaultFeatureFlags();
      Object.keys(defaults).forEach((key) => {
        features[key] = defaults[key];
      });

      if (profile === "safe") {
        features.webContextFetcher = false;
        features.pyodideCodeRunner = false;
        features.streamingBrowserTts = false;
      } else if (profile === "balanced") {
        features.webContextFetcher = true;
        features.pyodideCodeRunner = false;
        features.streamingBrowserTts = false;
      } else if (profile === "full") {
        features.webContextFetcher = true;
        features.pyodideCodeRunner = true;
        features.streamingBrowserTts = true;
      }

      state.ops.profile = profile;
    }

    function localBridgeCommand(cmdRaw) {
      const raw = String(cmdRaw || "").trim();
      if (!raw) return false;
      const command = raw.startsWith("/") ? raw.slice(1) : raw;
      const parts = command.split(/\s+/).filter(Boolean);
      const root = (parts[0] || "").toLowerCase();
      const arg1 = (parts[1] || "").toLowerCase();
      const player = getActivePlayer();
      let advanceTurn = false;

      switch (root) {
        case "status":
          break;
        case "save":
          state.ops.saves = Number(state.ops.saves || 0) + 1;
          break;
        case "load": {
          const loaded = loadFrameworkStateFromStorage();
          Object.keys(state).forEach((k) => delete state[k]);
          Object.assign(state, loaded);
          break;
        }
        case "profile":
          applyProfile(parts[1] || "safe");
          break;
        case "feature":
          if (arg1 === "on" || arg1 === "off") {
            const key = parts[2];
            if (key) state.config.features[key] = arg1 === "on";
          }
          break;
        case "settings":
          if (arg1 === "set") {
            const path = parts[2];
            const valueRaw = command.replace(/^settings\s+set\s+\S+\s*/i, "");
            if (path)
              setNestedValue(state.config, path, parseSettingValue(valueRaw));
          }
          break;
        case "perf":
          if (arg1 === "on") state.perf.enabled = true;
          if (arg1 === "off") state.perf.enabled = false;
          if (arg1 === "clear") state.perf.samples = [];
          if (arg1 === "sample") {
            if (!Array.isArray(state.perf.samples)) state.perf.samples = [];
            const sample = {
              at: new Date().toISOString(),
              turn: Number(state.world.turn || 0),
              storyChars: storyLogEl ? storyLogEl.value.length : 0,
            };
            state.perf.samples.push(sample);
            if (state.perf.samples.length > 120) state.perf.samples.shift();
            state.perf.lastSampleAt = sample.at;
          }
          break;
        case "sync":
          if (arg1 === "on") state.multiplayer.enabled = true;
          if (arg1 === "off") state.multiplayer.enabled = false;
          if (arg1 === "now")
            state.multiplayer.lastSyncAt = new Date().toISOString();
          if (arg1 === "room") {
            state.multiplayer.roomId = parts.slice(2).join(" ");
          }
          if (arg1 === "policy") {
            state.multiplayer.conflictPolicy = parts[2] || "local-wins";
          }
          break;
        case "quest":
          if (arg1 === "new") {
            const questName = parts.slice(2).join(" ") || "new quest";
            const id = "q_" + Date.now();
            state.quests[id] = {
              id,
              name: questName,
              step: 1,
              status: "active",
            };
            player.activeQuestId = id;
            advanceTurn = true;
          }
          if (
            arg1 === "next" &&
            player.activeQuestId &&
            state.quests[player.activeQuestId]
          ) {
            state.quests[player.activeQuestId].step =
              Number(state.quests[player.activeQuestId].step || 1) + 1;
            advanceTurn = true;
          }
          break;
        case "combat":
          if (arg1 === "start") {
            const enemyName = parts.slice(2).join(" ") || "Hostile";
            state.combat[player.id] = {
              enemy: { name: enemyName, hp: 30, maxHp: 30 },
              turn: 1,
            };
            advanceTurn = true;
          }
          if (arg1 === "end") {
            delete state.combat[player.id];
            advanceTurn = true;
          }
          break;
        case "skill": {
          const combat = state.combat[player.id];
          if (combat && combat.enemy && arg1 === "strike") {
            const damage = 6 + Math.floor(Math.random() * 8);
            combat.enemy.hp = Math.max(
              0,
              Number(combat.enemy.hp || 0) - damage,
            );
            combat.turn = Number(combat.turn || 0) + 1;
            if (combat.enemy.hp === 0) delete state.combat[player.id];
            advanceTurn = true;
          }
          if (combat && arg1 === "guard") {
            combat.turn = Number(combat.turn || 0) + 1;
            advanceTurn = true;
          }
          break;
        }
        default:
          break;
      }

      if (advanceTurn) {
        state.world.turn = Number(state.world.turn || 0) + 1;
      }

      state.ops.lastCommand = "/" + command;
      state.ops.lastCommandAt = new Date().toISOString();
      persistState();
      return true;
    }

    localBridgeCommand.__bfrpgLocalBridge = true;

    window.__bf_cmd = localBridgeCommand;
    window.__bf_openAdmin = () => {
      if (window.__bfp && typeof window.__bfp.open === "function") {
        window.__bfp.open();
      }
      return true;
    };
    window.__bf_togglePerf = () => {
      state.perf.enabled = !state.perf.enabled;
      persistState();
      return state.perf.enabled;
    };
    window.__bf_toggleSync = () => {
      state.multiplayer.enabled = !state.multiplayer.enabled;
      persistState();
      return state.multiplayer.enabled;
    };
    window.__bf_syncNow = () => {
      state.multiplayer.lastSyncAt = new Date().toISOString();
      persistState();
      return true;
    };
    window.__bf_perfSummary = () => ({
      enabled: !!state.perf.enabled,
      samples: Array.isArray(state.perf.samples)
        ? state.perf.samples.length
        : 0,
      lastSampleAt: state.perf.lastSampleAt || null,
    });
    window.__bf_stateHash = () => {
      try {
        const raw = JSON.stringify(state);
        let hash = 0;
        for (let i = 0; i < raw.length; i += 1) {
          hash = (hash * 31 + raw.charCodeAt(i)) | 0;
        }
        return String(hash >>> 0);
      } catch {
        return "0";
      }
    };
    window.__bf_adminDebugEnabled = true;
    window.__bfrpgLocalBridgeInstalled = true;
    window.__bfrpgBridgeSource = "local-fallback";
    window.__bfrpgLocalBridge = {
      state,
      advanceTurn() {
        state.world.turn = Number(state.world.turn || 0) + 1;
        persistState();
      },
      reset() {
        const fresh = createDefaultFrameworkState();
        Object.keys(state).forEach((k) => delete state[k]);
        Object.assign(state, fresh);
        persistState();
      },
      save: persistState,
    };
  }

  function compactSnapshot(snapshot) {
    if (!snapshot || typeof snapshot !== "object") return null;

    return {
      framework: {
        version: snapshot.framework ? snapshot.framework.version : null,
        mode: snapshot.framework ? snapshot.framework.mode : null,
        turn: snapshot.framework ? snapshot.framework.turn : null,
        playersCount: snapshot.framework
          ? snapshot.framework.playersCount
          : null,
        activePlayerName: snapshot.framework
          ? snapshot.framework.activePlayerName
          : null,
        activeQuestName: snapshot.framework
          ? snapshot.framework.activeQuestName
          : null,
        combatEnemy: snapshot.framework ? snapshot.framework.combatEnemy : null,
      },
      bridge: {
        hasCommandBridge: snapshot.bridge
          ? !!snapshot.bridge.hasCommandBridge
          : false,
        hasOpenAdmin: snapshot.bridge ? !!snapshot.bridge.hasOpenAdmin : false,
        hasTogglePerf: snapshot.bridge
          ? !!snapshot.bridge.hasTogglePerf
          : false,
        hasToggleSync: snapshot.bridge
          ? !!snapshot.bridge.hasToggleSync
          : false,
      },
    };
  }

  function getFrameworkSnapshot() {
    try {
      if (window.__bfp && typeof window.__bfp.snapshot === "function") {
        return compactSnapshot(window.__bfp.snapshot());
      }
    } catch (err) {
      console.error(err);
    }
    return null;
  }

  function updateBridgeUi() {
    installLocalFrameworkBridgeIfNeeded();

    const hasPluginApi = !!(
      window.__bfp && typeof window.__bfp.run === "function"
    );
    const hasBridge = typeof window.__bf_cmd === "function";
    const localBridge = !!(
      window.__bf_cmd && window.__bf_cmd.__bfrpgLocalBridge
    );

    if (hasPluginApi && hasBridge && !localBridge) {
      bridgeBadge.className = "badge ready";
      bridgeBadge.textContent = "Bridge status: ready (framework bridge)";
    } else if (hasPluginApi && hasBridge && localBridge) {
      bridgeBadge.className = "badge partial";
      bridgeBadge.textContent = "Bridge status: ready (local bridge adapter)";
    } else if (hasPluginApi) {
      bridgeBadge.className = "badge partial";
      bridgeBadge.textContent =
        "Bridge status: plugin loaded, framework bridge missing";
    } else {
      bridgeBadge.className = "badge error";
      bridgeBadge.textContent = "Bridge status: control plugin unavailable";
    }

    const snap = getFrameworkSnapshot();
    frameworkSnapshotEl.textContent = snap
      ? JSON.stringify(snap, null, 2)
      : localBridge
        ? "Local bridge is active, but snapshot is not available yet."
        : "No snapshot available yet. Load your framework custom code and keep this panel open.";
  }

  function runFrameworkCommand(command) {
    const cmd = String(command || "").trim();
    if (!cmd) return false;

    if (!window.__bfp || typeof window.__bfp.run !== "function") {
      setStatus("Control plugin API is not available.", "warn");
      updateBridgeUi();
      return false;
    }

    const ok = window.__bfp.run(cmd);
    setStatus(ok ? `Sent ${cmd}` : `Failed to send ${cmd}`, ok ? "ok" : "warn");
    updateBridgeUi();
    return ok;
  }

  function runCustomFrameworkCommand() {
    runFrameworkCommand(frameworkCommandEl.value);
    frameworkCommandEl.focus();
    frameworkCommandEl.select();
  }

  async function warmupSafe() {
    if (!window.__bfp || typeof window.__bfp.runBatch !== "function") {
      setStatus("Control plugin API is not available.", "warn");
      return;
    }

    setStatus("Running safe warmup macro...", "normal");
    await window.__bfp.runBatch(
      ["/profile safe", "/feature list", "/status", "/save"],
      220,
    );
    setStatus("Safe warmup macro sent.", "ok");
    updateBridgeUi();
  }

  function openControlCenter() {
    if (window.__bfp && typeof window.__bfp.open === "function") {
      window.__bfp.open();
      setStatus("Opened RPG Control Center.", "ok");
      return;
    }
    setStatus("Control plugin API is not available.", "warn");
  }

  function buildPrompt(actionText) {
    const baseInstruction = gmInstructionText.textContent.trim();
    const worldSeed = worldSeedEl.value.trim() || "(No world setup provided.)";
    const history = storyLogEl.value.trim() || "(No story log yet.)";
    const snapshot = getFrameworkSnapshot();
    const bridgeSource = window.__bfrpgBridgeSource || "unknown";

    return [
      baseInstruction,
      "",
      "WORLD SETUP:",
      worldSeed,
      "",
      "BRIDGE SOURCE:",
      bridgeSource,
      "",
      "FRAMEWORK SNAPSHOT JSON:",
      snapshot ? JSON.stringify(snapshot, null, 2) : "unavailable",
      "",
      "STORY LOG:",
      history,
      "",
      "PLAYER NEXT ACTION:",
      actionText || "Continue naturally based on current momentum.",
    ].join("\n");
  }

  function persistState() {
    localStorage.setItem(STORAGE_WORLD, worldSeedEl.value);
    localStorage.setItem(STORAGE_LOG, storyLogEl.value);
  }

  function restoreState() {
    const world = localStorage.getItem(STORAGE_WORLD);
    const log = localStorage.getItem(STORAGE_LOG);
    if (world !== null) worldSeedEl.value = world;
    if (log !== null) storyLogEl.value = log;
  }

  async function generateTurn() {
    if (activeGeneration) return;

    const actionText = actionInputEl.value.trim();
    storyBeforeTurn = storyLogEl.value;

    const actionLine = `> ${actionText || "Continue."}`;
    storyLogEl.value = [storyLogEl.value.trim(), actionLine]
      .filter(Boolean)
      .join("\n\n");
    previewEl.textContent = "";
    persistState();

    generateBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus("Generating turn...", "normal");

    activeGeneration = ai({
      instruction: buildPrompt(actionText),
      stopSequences: ["\n> "],
      onChunk: (data) => {
        previewEl.textContent += data.textChunk;
      },
    });

    const result = await activeGeneration.onFinishPromise;

    if (!activeGeneration) {
      return;
    }

    activeGeneration = null;
    generateBtn.disabled = false;
    stopBtn.disabled = true;

    if (result.stopReason === "error") {
      setStatus("Generation failed. Try again.", "warn");
      return;
    }

    const generatedText = previewEl.textContent.trim();
    if (generatedText) {
      storyLogEl.value = [storyLogEl.value.trim(), generatedText]
        .filter(Boolean)
        .join("\n\n");
    }

    previewEl.textContent = "";
    actionInputEl.value = "";
    actionInputEl.focus();
    if (
      window.__bfrpgLocalBridge &&
      typeof window.__bfrpgLocalBridge.advanceTurn === "function"
    ) {
      window.__bfrpgLocalBridge.advanceTurn();
    }
    persistState();
    setStatus("Turn generated.", "ok");
    updateBridgeUi();
  }

  function stopGeneration() {
    if (!activeGeneration) return;
    activeGeneration.stop();
    activeGeneration = null;
    generateBtn.disabled = false;
    stopBtn.disabled = true;
    setStatus("Generation stopped.", "warn");
  }

  function undoLastTurn() {
    if (!storyBeforeTurn && storyBeforeTurn !== "") return;
    storyLogEl.value = storyBeforeTurn;
    previewEl.textContent = "";
    persistState();
    setStatus("Reverted the last turn.", "ok");
  }

  function clearSession() {
    if (!confirm("Clear world setup and story log for this generator?")) return;
    worldSeedEl.value = "";
    storyLogEl.value = "";
    previewEl.textContent = "";
    actionInputEl.value = "";
    storyBeforeTurn = "";
    if (
      window.__bfrpgLocalBridge &&
      typeof window.__bfrpgLocalBridge.reset === "function"
    ) {
      window.__bfrpgLocalBridge.reset();
    }
    persistState();
    setStatus("Session cleared.", "ok");
    updateBridgeUi();
  }

  worldSeedEl.addEventListener("input", persistState);
  storyLogEl.addEventListener("input", persistState);

  installLocalFrameworkBridgeIfNeeded();
  restoreState();
  stopBtn.disabled = true;
  updateBridgeUi();
  setInterval(updateBridgeUi, 1400);
</script>

<style>
  :root {
    --bg: #f3ece0;
    --ink: #1e2935;
    --card: rgba(255, 255, 255, 0.86);
    --line: rgba(30, 41, 53, 0.18);
    --accent: #0f766e;
    --accent-2: #1f4f9a;
    --warning: #9a3412;
    --ok: #166534;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 20px;
    color: var(--ink);
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    background:
      radial-gradient(
        circle at 12% 0%,
        rgba(15, 118, 110, 0.13),
        transparent 36%
      ),
      radial-gradient(
        circle at 90% 100%,
        rgba(31, 79, 154, 0.14),
        transparent 42%
      ),
      var(--bg);
  }

  h1,
  h2 {
    margin: 0;
    font-family: "Trebuchet MS", "Gill Sans", sans-serif;
    letter-spacing: 0.02em;
  }

  .hero {
    max-width: 1120px;
    margin: 0 auto 14px;
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: linear-gradient(
      120deg,
      rgba(255, 255, 255, 0.92),
      rgba(236, 245, 255, 0.86)
    );
    box-shadow: 0 16px 34px rgba(25, 41, 62, 0.11);
  }

  .hero p {
    margin: 6px 0 0;
    opacity: 0.8;
  }

  .layout {
    max-width: 1120px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(280px, 0.8fr) minmax(340px, 1.2fr);
    gap: 14px;
